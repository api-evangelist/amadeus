  /booking/hotel-bookings:
    parameters:
    - $ref: '#/parameters/Ama-Client-Ref'
    - $ref: '#/parameters/Accept-Encoding'
    post:
      tags:
      - Booking
      description: ''
      summary: Amadeus Create Orders Associated to the Hotel Offers
      operationId: createBooking
      parameters:
      - $ref: '#/parameters/bookingBody'
      responses:
        '201':
          $ref: '#/responses/BookingSell'
        '400':
          $ref: '#/responses/Error400ResponseCreateBooking'
        '500':
          $ref: '#/responses/Error500ResponseCreateBooking'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /ordering/transfer-orders:
    post:
      tags:
      - Booking
      operationId: createTransferOrder
      summary: Amadeus Performs a Transfer Reservation.
      parameters:
      - in: query
        name: offerId
        type: string
        required: true
        description: transfer offer id from shopping/transfer-offers response
        x-example: '12345'
      - name: body
        in: body
        required: true
        schema:
          title: Body_Reservation
          required:
          - data
          properties:
            data:
              type: object
              title: Body_Reservation_Data
              required:
              - passengers
              - payment
              properties:
                note:
                  description: note to driver
                  type: string
                flightNumber:
                  description: flight number. Mandatory if service provider has setting "FLIGHT_NUMBER_REQUIRED"
                  type: string
                passengers:
                  type: array
                  items:
                    $ref: '#/definitions/Passenger'
                agency:
                  $ref: '#/definitions/Agency'
                payment:
                  $ref: '#/definitions/Payment_2'
                equipment:
                  type: array
                  items:
                    $ref: '#/definitions/Equipment'
                extraServices:
                  type: array
                  items:
                    $ref: '#/definitions/ExtraService'
                loyaltyNumber:
                  $ref: '#/definitions/LoyaltyNumber'
                corporation:
                  $ref: '#/definitions/Corporation'
                startConnectedSegment:
                  $ref: '#/definitions/TravelSegment'
                endConnectedSegment:
                  $ref: '#/definitions/TravelSegment'
              example:
                data:
                  note: Note to driver
                  passengers:
                  - firstName: John
                    lastName: Doe
                    title: MR
                    contacts:
                      phoneNumber: '+33123456789'
                      email: user@email.com
                    billingAddress:
                      line: Avenue de la Bourdonnais, 19
                      zip: '75007'
                      countryCode: FR
                      cityName: Paris
