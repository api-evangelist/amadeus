  PaymentOutput:
    title: Payment Information in output message
    type: object
    description: Model with the hotel payment information
    properties:
      iataTravelAgency:
        type: object
        description: Agency IATA/ARC Number used to Guarantee the booking
        properties:
          iataNumber:
            type: string
            example: CDG
        required:
        - iataNumber
      billBack:
        type: object
        description: 'To be used when the booking is paid with to a virtual credit card generated through an external provider like Conferma.


          The Billback account number is mandatory.

          The rest of the information is not mandatory. CAI (Travel Agwency ID) and CBI (Booker ID) can either be provided in input or can be taken from the Amadeus Office Profile.


          Offline activation of Hotel Billback: As soon as Conferma creates the client account and provides Amadeus with specific credentials (CAI/CBI) to identify the agency, Amadeus is able to activate Billback by updating those CAI/CBI credentials into the agency profile (PVA field).'
        properties:
          travelAgencyId:
            type: string
            description: Travel Agency Conferma account (CAI)
            example: '12345'
          bookerId:
            type: string
            description: Travel Agent conferma ID (CBI)
            example: '12345'
          paymentInstructions:
            type: string
            description: 'optional free text.

              It gives the user the ability to specify the payment instructions to be sent to the hotelier'
            example: string-value
          billbackProviderDeploymentId:
            type: string
            description: The Deployment Id is returned by Amadeus Payment server and is used as the payment reference.
            example: '12345'
          billbackProviderCode:
            type: string
            description: For conferma provider, it will be CN.
            example: string-value
          billbackProviderAccountNumber:
            type: string
            description: Billback Provider account number (Conferma account number)
            example: 1
          hotelSupplierInformation:
            $ref: '#/definitions/Hotel_Contact'
        required:
        - billbackProviderDeploymentId
        - billbackProviderCode
        - billbackProviderAccountNumber
      method:
        type: string
        description: "Indicates the method of payment. \n- CREDIT_CARD : It allows payment through a credit card. It is expected to provide the credit card information in the creditCard section.\n- AGENCY_ACCOUNT (CREDIT LINE) : It allows payment through the credit line of the agency. Nothing more is expected\n- VCC_BILLBACK : It allows direct payment between the hotel and a corporation or travel agency, via the billback provider.\nIt is expected to provide the billback information in the billback section.\nTo benefit from the solution, a contract has to be signed with the travel agency and\nAmadeus or Conferma. A contract with a banking partner is also required to open a bank account and issue the Virtual Credit Card.\n- VCC_B2B_WALLET : This payment method is only available for Amadeus Value Hotels where it allows payment between travel agency and Amadeus Merchant using a virtual credit card.\nTo avail this functionality a Travel Agent has to sign a contract with Amadeus PaymentPlatform, which helps to generate a virtual credit card on behalf of the travel agent.\n- TRAVEL_AGENT_ID (IATA BS) : It allows payment to the provider with to the IATA booking source. Either this information is passed in the TravelAgentId section, either it is taken from the Amadeus Office Profile.\n- CREDIT_CARD_AGENCY : This form of payment is exclusively used for Amadeus Value Hotel when the booking is paid with the Travel Agency credit card.\nIt is also possible in this case to use the method CREDIT_CARD but it is then mandatory to specify that the cardOwnerType is TravelAgency\n- CREDIT_CARD_TRAVELLER : This form of payment is exclusively used for Amadeus Value Hotel when the booking is paid with the guest credit card.\nIt is also possible in this case to use the method CREDIT_CARD but it is then mandatory to specify that the cardOwnerType is Guest\n"
        enum:
        - CREDIT_CARD
        - CREDIT_CARD_AGENCY
        - CREDIT_CARD_TRAVELER
        - AGENCY_ACCOUNT
        - VCC_BILLBACK
        - VCC_B2B_WALLET
        - TRAVEL_AGENT_ID
        example: CREDIT_CARD
      b2bWallet:
        type: object
        description: "To perform a booking with B2B wallet, no extra information is needed in input. \nInformation on the virtal credit card generated, is provided in this section in reply."
        properties:
          virtualCreditCardId:
            type: string
            description: Amadeus Payment Reference for the generated VCC.
            example: '12345'
          paymentProvider:
            type: string
            description: Payment provider, for example IXARIS.
            example: string-value
        required:
        - virtualCreditCardId
        - paymentProvider
      paymentCard:
        type: object
        description: Credit card information.
        properties:
          paymentCardInfo:
            type: object
            description: Credit or Debits cards.
            title: PaymentCard
            properties:
              vendorCode:
                type: string
                example: VI
                description: Two-letter code card type or vendor code. E.g. VI for VISA, MA for MasterCard.
                maxLength: 30
                minLength: 0
              holderName:
                type: string
                description: Name of credit card holder.
                maxLength: 99
                minLength: 1
                example: Sample Name
              cardNumber:
                type: string
                description: Card number
                example: 1
              expiryDate:
                type: string
                description: Date of the expiration of the card in the format MMYY
                example: '2026-08-15'
            required:
            - vendorCode
            - holderName
            - cardNumber
            - expiryDate
          cardOwnerType:
            type: string
            description: 'Indicates who is the owner of the credit card, it can be either the travel agency "TravelAgency", the corporation "Corporation" or the traveller "Guest".

              This field is mamdatory for Amadeus Value Hotel when the method of payment is CREDIT_CARD.

              This field is optional in informational in all other cases.'
            enum:
            - TravelAgency
            - Guest
            - Corporation
            example: TravelAgency
          VCC:
            type: boolean
            description: 'If the provided card is a virtual credit card generated by an external provider, this boolean should be true.

              (It is different from  Billback and B2B wallet VCC. These ones are generated during Amadeus booking process and have a dedicated payment section.)'
            example: true
          address:
            $ref: '#/definitions/Address_3'
        required:
        - paymentCardInfo
    required:
    - method
  HotelProduct_PaymentPolicy:
    title: HotelProduct_PaymentPolicy
    type: object
    description: Accepted Payment Methods and Card Types. Several Payment Methods and Card Types may be available.
    properties:
      creditCards:
        type: array
        description: Accepted Payment Card Types for the `method` CREDIT_CARD
        items:
          type: string
          pattern: ^[A-Z]{2}$
          minLength: 2
          maxLength: 2
          example: VI
          description: "card type (CA, VI, AX, DC...)\nExamples:\n  * CA - Mastercard (warning: use it instead of MC/IK/EC/MD/XS)\n  * VI - VISA\n  * AX - AMERICAN EXPRESS\n  * DC - Diners Club\n  * DS - DISCOVER\n  * JC - JCB\n  * TP - UATP / AirPlus\n  * UP - UnionPay  \n"
        example:
        - CA
        - VI
        - AX
      methods:
        type: array
        description: Accepted Payment Methods
        items:
          type: string
          example: CREDIT_CARD
          enum:
          - CREDIT_CARD
          - CREDIT_CARD_AGENCY
          - CREDIT_CARD_TRAVELER
          - VCC_BILLBACK
          - VCC_B2B_WALLET
          - TRAVEL_AGENT_ID
          - AGENCY_ACCOUNT
          - CORPORATE_ID
          - CHECK
          - ADVANCE_DEPOSIT
          - COMPANY_ADDRESS
          - HOTEL_GUEST_ID
          - MISC_CHARGE_ORDER
          - DEFERED_PAYMENT
          - TRAVEL_AGENT_IMMEDIATE
          description: "The Payment Methods :\n * CREDIT_CARD (CC) - Payment Cards in `creditCards` are accepted\n * CREDIT_CARD_AGENCY (CA) - Payment Cards in `creditCards` are accepted\n * CREDIT_CARD_TRAVELER (CC) - Payment Cards in `creditCards` are accepted\n * AGENCY_ACCOUNT - Agency Account (Credit Line) is accepted. Agency is Charged at CheckOut\n * TRAVEL_AGENT_ID - Agency IATA/ARC Number is accepted to Guarantee the booking\n * CORPORATE_ID (COR-ID) - Corporate Account is accepted to Guarantee the booking\n * HOTEL_GUEST_ID - Hotel Chain Rewards Card Number is accepted to Guarantee the booking\n * CHECK - Checks are accepted\n * MISC_CHARGE_ORDER - Miscellaneous Charge Order is accepted\n * ADVANCE_DEPOSIT - Cash is accepted for Deposit/PrePay\n * COMPANY_ADDRESS - Company Billing Address is accepted to Guarantee the booking"
  DiscountCode:
    type: object
    description: discount object that gives access to negotiated prices
    properties:
      type:
        type: string
        description: describes type of discount
        enum:
        - CD
        - PC
        example: CD
      value:
        type: string
        description: "discount code value. \n\"CD\" type stands for corporate discount code - a number generated by provider in case of\n  special agreement with a given subscriber is passed (airlines, TMC,\n  corporation…). It gives to subscriber access to negotiated prices for\n  transfer      \n\"PC\" - for promotional/campaign discount code - a voucher code generated by the\n  provider valid for a given period of time or a given number of usage.\n  The code is sent by customer to provider in order to get a discounted\n  price."
        example: string-value
  BaseName:
    type: object
    description: description of the name of a physical person
    properties:
      firstName:
        description: First name.
        type: string
        example: Marie
      lastName:
        description: Last name.
        type: string
        example: Dupont
      middleName:
        description: Middle name(s), for example "Lee" in "John Lee Smith".
        type: string
        example: Sample Name
  Distance:
    properties:
      value:
        description: great-circle distance between two locations. This distance thus do not take into account traffic conditions; international boundaries; mountains; water; or other elements that might make the a nearby location hard to reach.
        type: integer
        example: 152
      unit:
        description: unit of the distance
        type: string
        example: KM
        enum:
        - KM
        - MI
  Stakeholder:
    type: object
    description: stakeholder definition
    properties:
      id:
        description: item identifier
        type: string
        example: '12345'
      dateOfBirth:
        type: string
        format: date
        description: The date of birth in ISO 8601 format (yyyy-mm-dd)
        example: '2026-08-15'
      gender:
        $ref: '#/definitions/StakeholderGender'
      name:
        $ref: '#/definitions/Name'
      documents:
        type: array
        description: Advanced Passenger Information - regulatory identity documents - SSR DOCS & DOCO elements
        items:
          $ref: '#/definitions/IdentityDocument'
  Corporation:
    type: object
    description: information about corporation
    properties:
      address:
        $ref: '#/definitions/AddressCommon'
      info:
        type: object
        description: "corporate information map. Possible keys\n\nkey    | name\n------ | ----------------------------\nAU\t   | Accounting Unit\nON\t   | Order Number\nDC\t   | Department Code\nCC\t   | Company Code\nCN\t   | Company Name\nIA\t   | Internal Account\nCE\t   | Cost Centre\nEN\t   | Employee Number\nPN\t   | Project Number\n"
        additionalProperties:
          type: string
        example:
          AU: Accounting Unit
          'ON': Order Number
          DC: Department Code
          CC: Company Code
          CN: Company Name
          IA: Internal Account
          CE: Cost Centre
          EN: Employee Number
          PN: Project Number
  ElementaryPrice:
    description: elementaryPrice
    type: object
    properties:
      amount:
        type: string
        description: Amount of the fare. could be alpha numeric. Ex- 500.20 or 514.13A, 'A'signifies additional collection.
        example: '199.50'
      currencyCode:
        type: string
        description: Currency type of the fare.
        example: EUR
  PaymentInput:
    title: Payment Information in input message
    type: object
    description: Model with the hotel payment information
    properties:
      iataTravelAgency:
        type: object
        description: 'Agency IATA/ARC Number used to Guarantee the booking.

          If not provided it is taken form the Amadeus Office profile.'
        properties:
          iataNumber:
            type: string
            example: CDG
      method:
        type: string
        description: "Indicates the method of payment. \n- CREDIT_CARD : It allows payment through a credit card. It is expected to provide the credit card information in the paymentCard section."
        enum:
        - CREDIT_CARD
        example: CREDIT_CARD
      paymentCard:
        type: object
        description: "Credit card information.\nThe full details of a credit card are expected :\n  . credit card holder name (mandatory, maximum 64 chars) \n  . credit card vendor code (mandatory)\n  . credit card number (mandatory)\n  . credit card expiry date (mandatory)\n  . credit card security code (optional, it is anyway strongly recommended to always provide it for Aggregators)"
        properties:
          paymentCardInfo:
            type: object
            description: Credit or Debits cards.
            title: PaymentCard
            properties:
              vendorCode:
                type: string
                example: VI
                description: Two-letter code card type or vendor code. E.g. VI for VISA, MA for MasterCard.
                maxLength: 30
                minLength: 0
              holderName:
                type: string
                description: Name of credit card holder.
                maxLength: 99
                minLength: 1
                example: Sample Name
              cardNumber:
                type: string
                description: Card number
                example: 1
              securityCode:
                type: string
                description: Card security code
                example: '193'
                minLength: 3
                maxLength: 4
              expiryDate:
                type: string
                description: Date of the expiration of the card in the format MMYY
                example: '2026-08-15'
            required:
            - vendorCode
            - holderName
            - cardNumber
            - expiryDate
          address:
            $ref: '#/definitions/Address_3'
        required:
        - paymentCardInfo
    required:
    - method
  PhoneDeviceType:
    type: string
    description: Type of the device (Landline, Mobile or Fax)
    enum:
    - MOBILE
    - LANDLINE
    - FAX
  TravelSegmentLocation:
    description: The flight or train departure/arrival date&time, location information
    type: object
    properties:
      uicCode:
        type: string
        description: The railway UIC code defined by the worldwide railway organization, e.g. 7400001
        example: 7400001
      iataCode:
        type: string
        description: The airport code from IATA table codes, e.g. CDG
        example: CDG
      localDateTime:
        type: string
        description: The date and time inspired from ISO 8601 (YYYY-MM-DDTHH:MM:SS) format
        format: date-time
        example: '2021-03-27T20:03:00'
  Extended_Price:
    type: object
    title: Price
    description: price information
    allOf:
    - type: object
      properties:
        margin:
          description: BOOK step ONLY - The price margin percentage (plus or minus) that the booking can tolerate. When set to 0, then no price magin is tolerated.
          type: string
          example: '1.00'
        grandTotal:
          description: Total amount paid by the user (including fees and selected additional services).
          type: string
          example: '987.00'
        billingCurrency:
          description: Currency of the payment. It may be different than the requested currency
          type: string
          example: EUR
        additionalServices:
          type: array
          title: AdditionalServices
          items:
            title: AdditionalService
            type: object
            properties:
              amount:
                type: string
                example: '332.70'
              type:
                $ref: '#/definitions/AdditionalServiceType'
    - $ref: '#/definitions/Price'
  Error_400_3:
    properties:
      errors:
        type: array
        items:
          $ref: '#/definitions/Issue_3'
    required:
    - errors
