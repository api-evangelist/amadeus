parameters:
  Accept-Encoding:
    name: Accept-Encoding
    in: header
    required: false
    type: string
    enum:
    - gzip
    - identity
    description: Compress the Response
  bookingBody:
    name: requestBody
    in: body
    description: '`offerId`, `guests`, `payments` and optional `rooms` for the repartition (when used the `rooms` array items must match the shopping offer `roomQuantity`)

      '
    required: true
    schema:
      type: object
      title: BookingSchema
      required:
      - data
      properties:
        data:
          type: object
          title: HotelBookingQuery
          required:
          - offerId
          - guests
          properties:
            offerId:
              type: string
              description: offerId to book
              pattern: ^[A-Z0-9]*$
              minLength: 2
              maxLength: 100
              example: 63A93695B58821ABB0EC2B33FE9FAB24D72BF34B1BD7D707293763D8D9378FC3
            guests:
              type: array
              description: minimum one guest is mandatory
              minItems: 1
              maxItems: 99
              uniqueItems: true
              items:
                $ref: '#/definitions/Stakeholder_2'
            payments:
              type: array
              description: payments (often mandatory)
              minItems: 1
              maxItems: 9
              uniqueItems: true
              items:
                $ref: '#/definitions/Payment'
            rooms:
              type: array
              description: rooms repartition (when used the `rooms` array items must match the shopping offer `roomQuantity`)
              minItems: 1
              maxItems: 9
              items:
                type: object
                title: Room
                description: room
                properties:
                  guestIds:
                    type: array
                    description: room main guest (and accompagnants) (optional)
                    uniqueItems: true
                    items:
                      type: integer
                      example: 1
                  paymentId:
                    type: integer
                    description: if missing, the first payment is used (optional)
                    example: 1
                  specialRequest:
                    type: string
                    description: special request to send to the reception (optional)
                    minLength: 2
                    maxLength: 120
                    example: I will arrive at midnight
      example:
        data:
          offerId: NRPQNQBOJM
          guests:
          - name:
              title: MR
              firstName: BOB
              lastName: SMITH
            contact:
              phone: '+33679278416'
              email: bob.smith@email.com
          payments:
          - method: creditCard
            card:
              vendorCode: VI
              cardNumber: '0000000000000000'
              expiryDate: 2026-01
  Ama-Client-Ref:
    name: Ama-Client-Ref
    in: header
    required: false
    type: string
    pattern: ^[A-Z0-9_]*$
    description: Client Reference to track Request/Response
