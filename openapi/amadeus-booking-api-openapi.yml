    properties:
      iataCode:
        description: '[IATA airline codes](http://www.iata.org/publications/Pages/code-search.aspx)'
        type: string
        example: JFK
      terminal:
        description: terminal name / number
        type: string
        example: T2
  HotelOffer:
    description: Hotel Offer
    title: HotelOffer
    allOf:
    - type: object
      properties:
        type:
          description: data type set to hotel-offer
          type: string
          example: hotel-offer
          default: hotel-offer
          enum:
          - hotel-offer
        id:
          type: string
          pattern: ^[A-Z0-9]*$
          minLength: 2
          maxLength: 100
          example: 63A93695B58821ABB0EC2B33FE9FAB24D72BF34B1BD7D707293763D8D9378FC3
          description: Unique identifier of this offer. Might be valid for a temporary period only.
      required:
      - id
    - $ref: '#/definitions/HotelProduct'
  ContactWithAddress:
    allOf:
    - $ref: '#/definitions/Contact_3'
    - type: object
      properties:
        address:
          $ref: '#/definitions/AddressCommon'
    description: Contact and Adress details
  AssociatedRecord:
    title: associated record
    description: record associated to the order
    allOf:
    - $ref: '#/definitions/AssociatedRecordCommon'
    - type: object
      properties:
        flightOfferId:
          type: string
          description: id of the impacted flight offer
          example: '1'
  PassengerCharacteristics:
    properties:
      passengerTypeCode:
        description: Passenger type codes e.g. CHD , ADT. CHD is for child and ADT for Adult.
        type: string
        example: child
      age:
        type: integer
        description: Age of the Passenger (Mandatory if typeCode= “CHD”)
        example: 12
  Equipment:
    type: object
    description: extra equipment information
    required:
    - code
    properties:
      code:
        type: string
        description: "extra equipment codes, which can take following values\n\ncode   | name                                 \n------ | -------------------------------------  \nBBS    | Baby stroller/Push chair\nBYC    | Bicycle rack\nCBB    | Cargo barrier rack\nCBF    | Cargo barrier front\nCBS    | Booster seat for child under 135cm or up to 12 years\nCSB    | Child seat determined by weight/age of child 1-3 years / 9-18 Kg\nCSI    | Child seat determined by weight/age of child 0-12 month/0-13Kg\nCST    | Child seat determined by weight/age of child 4-7 years/15 – 30 Kg\nSBR    | Snow board racks\nSKB    | Ski box\nSKR    | Ski rack\nTAB    | Travel Tablet \nWAR    | Wheelchair access ramp\nWHC    | Wheelchair\nWIF    | Wi-Fi access\nCNT    | Charger cable\n"
        enum:
        - BBS
        - BYC
        - CBB
        - CBF
        - CBS
        - CSB
        - CSI
        - CST
        - SBR
        - SKB
        - SKR
        - 'TAB '
        - WAR
        - WHC
        - WIF
        - CNT
        example: BBS
      itemId:
        type: string
        description: extra equipment identifier
        example: '12345'
      description:
        type: string
        description: extra equipment description
        example: Sample description text.
      quotation:
        $ref: '#/definitions/Quotation'
      converted:
        $ref: '#/definitions/Quotation'
      isBookable:
        type: boolean
        description: true if extra equipment is available for booking
        example: true
      taxIncluded:
        type: boolean
        description: true if tax included in extra equipment price
        example: true
      includedInTotal:
        type: boolean
        description: true if extra equipment price is included in total transfer amount
        example: '199.50'
  Stakeholder_2:
    type: object
    description: Guest Details
    required:
    - name
    - contact
    properties:
      id:
        type: integer
        description: item identifier
        example: 1
      name:
        $ref: '#/definitions/Name_2'
      contact:
        $ref: '#/definitions/Contact_2'
      hotelRewardsMember:
        type: string
        pattern: ^[A-Z0-9-]{1,21}$
        minLength: 1
        maxLength: 21
        example: '3081031320523260'
        description: 'Hotel Chain Rewards Member Number. To receive your Rewards Points, access online check in, fast check out. An error is returned by the Chain if the number is invalid.

          Example Rewards Programs:

          * Marriott Bonvoy

          * Hilton Honors

          * Hyatt Rewards

          * IHG Rewards

          * Wyndham Rewards

          * Accor Live Limitless ALL

          * Best Western Rewards

          * Choice Privileges

          * Radisson Rewards

          '
    example:
      id: 1
      name:
        title: MR
        firstName: BOB
        lastName: SMITH
      contact:
        phone: '+33679278416'
        email: bob.smith@email.com
  Error:
    type: object
    description: Error
    required:
    - code
    - title
    - status
    properties:
      code:
        type: integer
        description: '[Integer] A machine-readable error code from the Amadeus Canned Messages table, that will enable the API Consumers code to handle this type of error'
        example: 1
      title:
        type: string
        description: '[String] An error title from the Canned Messages table with a 1:1 correspondence to the error code. This may be localized'
        example: Resource not found
      detail:
        type: string
        description: '[String] An easy-to-read explanation specific to this occurrence of the problem. It should give the API consumer an idea of what went wrong and how to recover from it. Like the title, this field value can be localized.'
        example: The targeted resource doesn't exist
      status:
        type: integer
        description: '[Integer] The [HTTP status code](https://www.iana.org/assignments/http-status-codes/http-status-codes.xhtml) of this response. This is present only in terminal errors which cause an unsuccessful response. In the case of multiple errors, they must all have the same status.'
        example: 400
  FlightStop:
    title: FlightStop
    description: details of stops for direct or change of gauge flights
    allOf:
    - $ref: '#/definitions/OriginalFlightStop'
    - type: object
      properties:
        arrivalAt:
          description: arrival at the stop in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) YYYY-MM-ddThh:mm:ss format, e.g. 2017-02-10T20:40:00
          type: string
          format: date-time
          example: '2017-10-23T20:00:00'
        departureAt:
          description: departure from the stop in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) YYYY-MM-ddThh:mm:ss format, e.g. 2017-02-10T20:40:00
          type: string
          format: date-time
          example: '2017-10-23T20:00:00'
  AircraftEntry:
    additionalProperties:
      description: the manufacturer/model of aircraft
      type: string
  TravelSegment:
    description: A segment of an itinerary used by a traveler between 2 locations at a given date and time using a particular transportation type FLIGHT or TRAIN
    type: object
    properties:
      transportationType:
        $ref: '#/definitions/TransportationType'
      transportationNumber:
        type: string
        example: AF380
        description: The flight number or train number, e.g. AF380
      departure:
        $ref: '#/definitions/TravelSegmentLocation'
      arrival:
        $ref: '#/definitions/TravelSegmentLocation'
  Name:
    title: name
    description: name
    allOf:
    - $ref: '#/definitions/BaseName'
    - type: object
      properties:
        secondLastName:
          description: second last name
          type: string
  Phone:
    type: object
    description: phone information
    properties:
      deviceType:
        $ref: '#/definitions/PhoneDeviceType'
      countryCallingCode:
        type: string
        description: Country calling code of the phone number, as defined by the International Communication Union. Examples - "1" for US, "371" for Latvia.
        pattern: '[0-9+]{2,5}'
        example: 1
      number:
        type: string
        description: Phone number. Composed of digits only. The number of digits depends on the country.
        pattern: '[0-9]{1,15}'
        example: 1
  CreditCardCommon:
    title: creditCardCommon
    type: object
    description: credit card common attribute
    properties:
      brand:
        $ref: '#/definitions/CreditCardBrand'
      holder:
        description: card holder as on the card
        type: string
        example: MR DUPON DAMIEN
      number:
        description: card number
        type: string
        example: '4012999999999999'
        pattern: '[a-zA-Z0-9]{1,35}'
      expiryDate:
        description: credit card expiration date following [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) (YYYY-MM format, e.g. 2012-08)
        type: string
        example: 2021-08
  CurrencyEntry:
    additionalProperties:
      type: string
      example: EUR
  AirTravelDocumentCommon:
    type: object
    properties:
      documentType:
        type: string
        description: Type of the travel document
        enum:
        - ETICKET
        - PTICKET
        - EMD
        - MCO
        example: ETICKET
      documentNumber:
        type: string
        description: Identifier of the travel document prefixed by its owner code [NALC - 3 digits]. Can either be a primary or a conjunctive document number. Necessary for TicketingReference definition.
        example: 1
      documentStatus:
        type: string
        description: Status of the travel document contained in the fare element
        enum:
        - ISSUED
        - REFUNDED
        - VOID
        - ORIGINAL
        - EXCHANGED
        example: ISSUED
  TransportationType:
    type: string
    title: TransportationType
    description: The type of connection "FLIGHT" or "TRAIN"
    enum:
    - FLIGHT
    - TRAIN
  ContactDictionary:
    description: represents a contact
    type: object
    properties:
      addresseeName:
        description: the name of the person addressed by these contact details
        $ref: '#/definitions/Name'
      address:
        $ref: '#/definitions/Address'
      language:
        description: the preferred language of communication with this Contact
        type: string
        example: EN
      purpose:
        $ref: '#/definitions/ContactPurpose'
  StakeholderGender:
    type: string
    description: Gender for individual
    enum:
    - MALE
    - FEMALE
    - UNSPECIFIED
    - UNDISCLOSED
    title: Gender
    example: FEMALE
  AutomatedProcessCode:
    type: string
    description: queuing action to be taken
    enum:
    - IMMEDIATE
    - DELAYED
    - ERROR
    example: IMMEDIATE
  TransferCancellation:
    type: object
    description: information returned in cancelation response
    properties:
      confirmNbr:
        type: string
        description: transfer identifier - confirmation number from service provider that identifies the ride
        example: string-value
      reservationStatus:
        type: string
        enum:
        - CANCELLED
        - CONFIRMED
        description: status of reservation
        example: CANCELLED
  Transfer:
    type: object
    required:
    - transferType
    - start
    - serviceProvider
    - vehicle
    - quotation
    - methodsOfPaymentAccepted
    properties:
      transferType:
        type: string
        enum:
        - PRIVATE
        - SHARED
        - TAXI
        - HOURLY
        - AIRPORT_EXPRESS
        - AIRPORT_BUS
        description: "amadeus transfer service type\n\nvalue           | description                                 \n--------------  | ------------------------\nPRIVATE         | Private transfer from point to point\nSHARED          | Shared transfer from point to point\nTAXI            | Taxi reservation from point to point, price is estimated\nHOURLY          | Chauffeured driven transfer per hour\nAIRPORT_EXPRESS | Express Train from/to Airport\nAIRPORT_BUS     | Express Bus from/to Airport\n"
        example: PRIVATE
      start:
        $ref: '#/definitions/Location'
      end:
        $ref: '#/definitions/Location'
      stopOvers:
        type: array
        items:
          $ref: '#/definitions/StopOver'
      passenegerCharacteristics:
        type: array
        items:
          $ref: '#/definitions/PassengerCharacteristics'
      duration:
        description: transfer duration in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) PnYnMnDTnHnMnS format, e.g. PT2H10M
        type: string
        example: PT2H30M
      vehicle:
        $ref: '#/definitions/Vehicle'
      serviceProvider:
        $ref: '#/definitions/ServiceProvider'
      partnerInfo:
        $ref: '#/definitions/PartnerInfo'
      quotation:
        $ref: '#/definitions/Quotation'
      converted:
        $ref: '#/definitions/Quotation'
      extraServices:
        type: array
        items:
          $ref: '#/definitions/ExtraService'
      equipment:
        type: array
        items:
          $ref: '#/definitions/Equipment'
      cancellationRules:
        type: array
        items:
          $ref: '#/definitions/CancellationRule'
      methodsOfPaymentAccepted:
        type: array
        description: list of payment methods, allowed by provider
        items:
          type: string
          description: Method of payment required when PaymentType equal BT (applicable only for reservation action).
          enum:
          - CREDIT_CARD
          - INVOICE
          - TRAVEL_ACCOUNT
          - PAYMENT_SERVICE_PROVIDER
      discountCodes:
        type: array
        description: list of discount codes
        items:
          $ref: '#/definitions/DiscountCode'
      distance:
        $ref: '#/definitions/Distance'
  Location:
    type: object
    description: location information
    properties:
      dateTime:
        description: 'date and time specified in the [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) YYYY-MM-DDThh:mm:ss format e.g. 2017-11-10T10:00:00

          not supported for stopOvers object

          '
        type: string
        example: '2019-11-10T10:30:00'
      locationCode:
        type: string
        description: airport code from [IATA table codes](http://www.iata.org/publications/Pages/code-search.aspx), e.g. CDG.
        pattern: '[A-Za-z]{3}'
        example: CDG
      address:
        $ref: '#/definitions/Address_4'
      name:
        type: string
        description: Place name e.g. Airport Name, Hotel Name etc.
        example: Sample Name
      googlePlaceId:
        description: Google place id only for google address e.g. ChIJL-DOWeBv5kcRfTbh97PimNc.
        type: string
        example: ChIJrTLr-GyuEmsRBfy61i59si0
      uicCode:
        type: string
        description: UIC code defined by the worldwide railway organization e.g. 8600626
        example: string-value
  AllotmentDetails:
    title: AllotmentDetails
    type: object
    properties:
      tourName:
        description: The tour name agreed for this specific allotment.
        type: string
        example: Sample Name
      tourReference:
        description: The tour reference agreed for this specific allotment.
        type: string
        example: string-value
  Segment:
    allOf:
    - type: object
      properties:
        id:
          description: Id of the segment
          type: string
          example: 1
        numberOfStops:
          description: Number of stops
          type: integer
          example: 0
        blacklistedInEU:
          description: "When the flight has a marketing or/and operating airline that is identified as blacklisted by the European Commission. \n\nTo improve travel safety, the European Commission regularly updates the list of the banned carriers from operating in Europe. It allows any Travel Agency located in the European Union to easily identify and hide any travel recommendation based on some unsafe airlines. \nThe [list of the banned airlines](https://ec.europa.eu/transport/sites/transport/files/air-safety-list_en.pdf) is published in the Official Journal of the European Union, where they are included as annexes A and B to the Commission Regulation. The blacklist of an airline can concern all its flights or some specific aircraft types pertaining to the airline   \n"
          type: boolean
          example: false
        co2Emissions:
          description: Co2 informations
          type: array
          minItems: 1
          items:
            title: Co2Emission
            $ref: '#/definitions/Co2Emission'
    - $ref: '#/definitions/FlightSegment'
  roomAssociation:
    type: object
    description: 'Room Association represents a room booked in an hotel, the guests sleeping in this room, the hotel loyalty program if any, plus special request if any. '
    minProperties: 1
    maxProperties: 1
    title: roomAssociation
    properties:
      guestReferences:
        type: array
        description: 'Array of guest references listing all the guests occupying the room.

          For each guest, the reference provided is the id also provided in guest section, except at booking creation time (in this only case, it will be a temporary id provided by the client called tid).

          The order of this list is important. The first one is the main guest, the one holding the reservation (and the form of payment).

          The following references are the ones of the accompagnants, if any.'
        items:
          type: object
          properties:
            guestReference:
              type: string
              example: string-value
            hotelLoyaltyId:
              type: string
              description: 'Hotel Chain Rewards Program Membership ID of the guest.

                To receive your Rewards Points, access online check in, fast check out. An error is returned by the Chain if the number is invalid.

                Example Rewards Programs:

                * Marriott Bonvoy

                * Hilton Honors

                * Hyatt Rewards

                * IHG Rewards

                * Wyndham Rewards

                * Accor Live Limitless ALL

                * Best Western Rewards

                * Choice Privileges

                * Radisson Rewards

                '
              pattern: ^[A-Z0-9-]{1,21}$
              minLength: 1
              maxLength: 21
              example: '3081031320523260'
          required:
          - guestReference
      specialRequest:
        type: string
        minLength: 2
        description: special request to send to the reception (optional)
        example: TEST I will arrive at midnight
        maxLength: 120
      hotelOfferId:
        type: string
        description: Hotel offerID received in availability response, identifying the product to book.
        example: 63A93695B58821ABB0EC2B33FE9FAB24D72BF34B1BD7D707293763D8D9378FC3
        maxLength: 100
        minLength: 2
        pattern: ^[A-Z0-9]*$
    required:
    - guestReferences
    - hotelOfferId
  FlightOrder:
    title: FlightOrderCreateQuery
    type: object
    description: input parameter to create a flight order
    required:
    - type
    - flightOffers
    properties:
      type:
        description: the resource name
        type: string
        example: flight-order
      id:
        description: unique identifier of the flight order
        type: string
        example: MlpZVkFMfFdBVFNPTnwyMDE1LTExLTAy
        readOnly: true
      queuingOfficeId:
        description: office Id where to queue the order
        type: string
        example: NCE1A0955
      ownerOfficeId:
        description: office Id where will be transfered the ownership of the order
        type: string
        example: NCE1A0955
      associatedRecords:
        description: list of associated record
        type: array
        readOnly: true
        items:
          $ref: '#/definitions/AssociatedRecord'
      flightOffers:
        description: list of flight offer
        type: array
        minItems: 1
        maxItems: 6
        items:
          $ref: '#/definitions/FlightOffer'
      travelers:
        description: list of travelers
        type: array
        minItems: 1
        maxItems: 18
        items:
          $ref: '#/definitions/Traveler'
      remarks:
        description: list of global remarks
        $ref: '#/definitions/Remarks'
      formOfPayments:
        description: list of form of payments
        type: array
        minItems: 1
        maxItems: 6
        readOnly: true
        items:
          $ref: '#/definitions/FormOfPayment'
      ticketingAgreement:
        $ref: '#/definitions/TicketingAgreement'
      automatedProcess:
        description: list of automatic queuing
        type: array
        minItems: 0
        maxItems: 31
        items:
          $ref: '#/definitions/AutomatedProcess'
      contacts:
        description: list of general contact information
        type: array
        items:
          $ref: '#/definitions/Contact'
      tickets:
        description: list of tickets
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/AirTravelDocument'
      formOfIdentifications:
        description: list of forms of identifications applicable to travelers by airline
        type: array
        items:
          $ref: '#/definitions/FormOfIdentification'
  HotelBooking:
    title: HotelBooking
    type: object
    description: 'An hotel booking represent one or several rooms booked in the same physical hotel.

      There is always a reference to this booking, provided by the hotel provider, stored in associated records section.'
    properties:
      type:
        type: string
        minLength: 1
        description: Type of data - set to "hotel-booking".
        example: string-value
      id:
        type: string
        description: 'Unique ID of the hotel booking ID.

          It is computed by Amadeus System based on technical data.'
        minLength: 1
        pattern: '[A-Za-z0-9+/=]'
        example: '456123'
      bookingStatus:
        type: string
        description: "Status of the booking - Possible values \n- \"CONFIRMED\"\n- \"PENDING\" for on-request \n- \"CANCELLED\" (It will be returned only in the retrieve byHistory as it repreents a DELETED resource.)\n- \"On HOLD\" for deferred payment (HO)\n- \"UNCONFIRMED\" (UC) when confirmation finaly refused by Hotel Provider\n- \"DENIED\" (NO) when an on-request booking is denied by the hotelier\n- \"GHOST\" (GK) for ghost booking\n- \"PAST\" for a confirmed booking with the check-out date in the past\n"
        enum:
        - CONFIRMED
        - PENDING
        - CANCELLED
        - ON_HOLD
        - PAST
        - UNCONFIRMED
        - DENIED
        - GHOST
        - DELETED
        example: CONFIRMED
      roomAssociations:
        type: array
        description: 'Array of room associations. Each room association correlates one single room to guest(s), a payment and an hotel offer.


          If multiple identical rooms are requested, one roomAssociation is created per hotelBooking (one hotelBooking is created per room).'
        items:
          $ref: '#/definitions/roomAssociation'
      hotelOffer:
        $ref: '#/definitions/HotelOffer'
      hotel:
        type: object
        description: Hotel Content
        title: Hotel
        properties:
          hotelId:
            type: string
            pattern: ^[A-Z0-9]{8}$
            example: ADPAR001
            description: 'Amadeus Property Code (8 chars)

              '
          chainCode:
            type: string
            pattern: ^[A-Z]{2}$
            example: AD
            description: 'Brand (RT...) or Merchant (AD...) (Amadeus 2 chars Code)

              '
          name:
            type: string
            example: Hotel de Paris
            description: Hotel Name
          self:
            type: string
            description: link to retrieve the hotel details
            example: string-value
        required:
        - hotelId
        - chainCode
        - name
      hotelProviderInformation:
        type: array
        uniqueItems: true
        minItems: 1
        description: References and origin of the hotel bookings records
        items:
          type: object
          properties:
            hotelProviderCode:
              type: string
              description: 2 letters - Hotel provider code  e.g.RT  (for Accor)
              example: RT
              minLength: 2
              maxLength: 2
            confirmationNumber:
              type: string
              description: "Provider confirmation number. \nNever empty, in case of on-request it can be .......\nIf you call the Provider, this Reference may be asked"
              example: '818319951754'
              minLength: 2
              maxLength: 16
              pattern: ^[A-Z0-9]*$
            cancellationNumber:
              type: string
              description: 'Provider cancellation number

                For cancelled booking it will ablways be filled.

                If it was not returned by the hotel provider, it will be filled with "NONE".'
              example: C818319951754
              minLength: 2
              maxLength: 16
              pattern: ^[A-Z0-9]*$
            onRequestNumber:
              type: string
              description: Used to describe the on-request identifier
              example: '818319951754'
              minLength: 2
              maxLength: 16
              pattern: ^[A-Z0-9]*$
          required:
          - hotelProviderCode
          - confirmationNumber
      payment:
        $ref: '#/definitions/PaymentOutput'
      travelAgentId:
        type: string
        description: "Travel Agent ID also called Booking source or IATA number.\n- When received in booking request, it indicates that the travel agent wants to override the booking source receiving the commission. \n- If not provided in booking request, it is set to the IATA Number of the office profile of the agent making the booking. (the commission is given to that office) "
        example: '12345'
      arrivalInformation:
        type: object
        description: 'Optional information on the way the guest is arriving to the hotel. Today the application only supports Flight details.

          If this information is provided at booking creation time, it is displayed in the response and in the retrieve.'
        properties:
          arrivalFlightDetails:
            $ref: '#/definitions/ArrivalFlightDetails'
    required:
    - type
    - id
    - roomAssociations
    - hotelOffer
    - hotel
    - hotelProviderInformation
    - travelAgentId
  guests:
    title: HotelProduct_Guests
    type: object
    properties:
      adults:
        type: integer
        minimum: 1
        maximum: 9
        example: 2
        description: number of adult guests (1-9) per room
      childAges:
        type: array
        items:
          type: integer
          minimum: 0
          maximum: 20
        description: Comma separated list of ages of each child at the time of check-out from the hotel. If several children have the same age, the ages will be repeated.
  Error_500_3:
    properties:
      errors:
        type: array
        items:
          $ref: '#/definitions/Issue_3'
    required:
    - errors
    example:
      errors:
      - status: 500
        code: 141
        title: SYSTEM ERROR HAS OCCURRED
  BaggageAllowance:
    description: baggageAllowance
    type: object
    properties:
      quantity:
        type: integer
        description: Total number of units
        example: 1
      weight:
        type: integer
        description: Weight of the baggage allowance
        example: 20
      weightUnit:
        type: string
        description: Code to qualify unit as pounds or kilos
        example: KG
  Guests:
    type: array
    items:
      allOf:
      - type: object
        properties:
          tid:
            type: integer
            description: "The tid is a temporary unique id of a guest. \nIt is arbitrarily chosen by the user until Amadeus application provides one."
          id:
            type: integer
            description: unique id of the Guest provided by Amadeus application
        required:
        - id
      - $ref: '#/definitions/Guest'
    description: Array of guests sharing the hotelOrder.
  Warning_2:
    type: object
    description: Warning
    required:
    - code
    - title
    properties:
      code:
        type: integer
        description: '[Integer] A machine-readable warning code from the Amadeus Canned Messages table, that will enable the API Consumers code to handle this type of warning'
        example: 1
      title:
        type: string
        description: '[String] A warning title from the Canned Messages table with a 1:1 correspondence to the warning code. This may be localized'
        example: Resource not found
      detail:
        type: string
        description: '[String] An easy-to-read explanation specific to this occurrence of the problem. It should give the API consumer an idea of what went wrong and how to recover from it. Like the title, this field value can be localized.'
        example: The targeted resource doesn't exist
