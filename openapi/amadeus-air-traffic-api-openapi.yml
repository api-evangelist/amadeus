openapi: 3.0.1
info:
  title: Airline Code Lookup air-traffic API
  description: 'Before using this API, we recommend you read our

    **[Authorization Guide](https://developers.amadeus.com/self-service/apis-docs/guides/authorization-262)**

    for more information on how to generate an access token.


    Please also be aware that our test environment is based on a subset of the production,

    to see what is included in test please refer to our **[data collection](https://github.com/amadeus4dev/data-collection)**.

    '
  version: 1.2.1
  x-status: validated
  x-tags:
  - '#ama-for-dev'
  x-release-note:
    1.2.0:
    - Migration to OAS3
    1.1.0:
    - Correct example
    - Regroup parameter "IATACode" and "ICAOCode" under the same name "airlineCodes"
    1.0.0:
    - initial version
    - List all airlines information (name and code)
    - Introduction of search per IATA or ICAO code
servers:
- url: https://test.api.amadeus.com/v1
tags:
- name: air-traffic
paths:
  /travel/analytics/air-traffic/busiest-period:
    get:
      tags:
      - air-traffic
      operationId: getAirTraffic
      summary: Amadeus Returns a List of Air Traffic Reports.
      parameters:
      - name: cityCode
        description: Code for the city following IATA standard. [IATA table codes](http://www.iata.org/publications/Pages/code-search.aspx) - e.g. BOS for Boston
        in: query
        required: true
        type: string
        pattern: '[A-Za-z]{3}'
        x-example: MAD
      - name: period
        description: 'time period (year) of the statistics.


          Year for which the statistic are requested following [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601)

          '
        in: query
        required: true
        type: string
        x-example: 2017
      - name: direction
        description: 'Use ARRIVING to have statistics on travelers coming to the city or DEPARTING for statistics on travelers leaving the city.


          By default, statistics are given on travelers ARRIVING the city.

          '
        in: query
        required: false
        default: ARRIVING
        type: string
        enum:
        - ARRIVING
        - DEPARTING
        x-example: ARRIVING
      responses:
        '200':
          $ref: '#/responses/air-traffic'
        '400':
          $ref: '#/responses/400'
        default:
          $ref: '#/responses/500'
      description: ''
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /travel/analytics/air-traffic/booked:
    get:
      tags:
      - air-traffic
      operationId: getAirTraffic
      summary: Amadeus Returns a List of Air Traffic Reports.
      parameters:
      - name: originCityCode
        description: Code for the origin city following IATA standard ([IATA table codes](http://www.iata.org/publications/Pages/code-search.aspx)). - e.g. BOS for Boston
        in: query
        required: true
        type: string
        pattern: '[A-Za-z]{3}'
        x-example: MAD
      - name: period
        description: "period when consumers are traveling.\n* It can be a month only. \n* ISO format must be used - e.g. 2015-05. \n* Period ranges are not supported. \n* Only periods from 2011-01 up to previous month are valid. \n* Future dates are not supported.\n"
        in: query
        required: true
        type: string
        x-example: 2017-08
      - name: max
        description: maximum number of destinations in the response. Default value is 10 and maximum value is 50.
        in: query
        required: false
        default: 10
        type: number
        format: integer
        x-example: 1.0
      - $ref: '#/parameters/fields'
      - $ref: '#/parameters/pageLimit'
      - $ref: '#/parameters/pageOffset'
      - $ref: '#/parameters/sort'
      responses:
        '200':
          $ref: '#/responses/air-traffic_2'
        '400':
          $ref: '#/responses/400_2'
        default:
          $ref: '#/responses/500'
      description: ''
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /travel/analytics/air-traffic/traveled:
    get:
      tags:
      - air-traffic
      operationId: getAirTraffic
      summary: Amadeus Returns a List of Air Traffic Reports.
      parameters:
      - name: originCityCode
        description: Code for the origin city following IATA standard ([IATA table codes](http://www.iata.org/publications/Pages/code-search.aspx)). - e.g. BOS for Boston
        in: query
        required: true
        type: string
        pattern: '[A-Za-z]{3}'
        x-example: MAD
      - name: period
        description: "period when consumers are traveling.\n* It can be a month only. \n* [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format must be used - e.g. 2015-05. \n* Period ranges are not supported. \n* Only periods from 2011-01 up to previous month are valid. \n* Future dates are not supported.\n"
        in: query
        required: true
        type: string
        x-example: 2017-01
      - name: max
        description: maximum number of destinations in the response. Default value is **10** and maximum value is 50.
        in: query
        required: false
        default: 10
        type: number
        format: integer
        x-example: 1.0
      - $ref: '#/parameters/fields'
      - $ref: '#/parameters/pageLimit'
      - $ref: '#/parameters/pageOffset'
      - $ref: '#/parameters/sort_2'
      responses:
        '200':
          $ref: '#/responses/air-traffic_3'
        '400':
          $ref: '#/responses/400_3'
        default:
          $ref: '#/responses/500'
      description: ''
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
definitions:
  Air_Traffic_2:
    properties:
      type:
        type: string
        example: air-traffic
      subType:
        type: string
        example: string-value
      destination:
