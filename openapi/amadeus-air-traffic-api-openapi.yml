        type: string
        example: WAS
      analytics:
        $ref: '#/definitions/Analytics_2'
  Travelers:
    properties:
      score:
        type: number
        format: integer
        description: Approximate score for ranking purposes calculated based on number of travelers in the location.
        example: 68
  Analytics_3:
    properties:
      flights:
        $ref: '#/definitions/Flights'
      travelers:
        $ref: '#/definitions/Travelers'
  Issue:
    properties:
      status:
        description: the HTTP status code applicable to this error
        type: integer
        example: 1
      code:
        description: an application-specific error code
        type: integer
        format: int64
        example: 1
      title:
        description: a short summary of the error
        type: string
        example: string-value
      detail:
        description: explanation of the error
        type: string
        example: string-value
      source:
        type: object
        title: Issue_Source
        description: an object containing references to the source of the error
        maxProperties: 1
        properties:
          pointer:
            description: a JSON Pointer [RFC6901] to the associated entity in the request document
            type: string
            example: string-value
          parameter:
            description: a string indicating which URI query parameter caused the issue
            type: string
            example: string-value
          example:
            description: a string indicating an example of the right value
            type: string
            example: string-value
  Analytics:
    properties:
      travelers:
        $ref: '#/definitions/Travelers'
  Collection_Meta:
    title: Collection_Meta
    properties:
      count:
        type: integer
        example: 1
      links:
        title: CollectionLinks
        properties:
          self:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          next:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          previous:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          last:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          first:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          up:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
        example:
          self: https://test.api.amadeus.com/v1/area/resources?param=value
  Analytics_2:
    properties:
      flights:
        $ref: '#/definitions/Flights'
      travelers:
        $ref: '#/definitions/Travelers'
  Air_Traffic:
    properties:
      type:
        type: string
        example: air-traffic
      period:
        description: Time period following [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) standard
        type: string
        example: 2017-01
      analytics:
        $ref: '#/definitions/Analytics'
  Error_400:
    properties:
      errors:
        type: array
        items:
          $ref: '#/definitions/Issue'
    required:
    - errors
    example:
      errors:
      - status: 400
        code: 477
        title: INVALID FORMAT
        detail: invalid query parameter format
        source:
          parameter: airport
          example: CDG
  Error_500:
    properties:
      errors:
        type: array
        items:
          $ref: '#/definitions/Issue'
    required:
    - errors
    example:
      errors:
      - status: 500
        code: 141
        title: SYSTEM ERROR HAS OCCURRED
  Flights:
    properties:
      score:
        type: number
        format: integer
        description: Approximate score for ranking purposes calculated based on number of flights from / to the airport or city
        example: 56
  Air_Traffic_3:
    properties:
      type:
        type: string
        example: air-traffic
      subType:
        type: string
        example: string-value
      destination:
        description: IATA code of the destination city - [IATA table codes](http://www.iata.org/publications/Pages/code-search.aspx)
        type: string
        example: WAS
      analytics:
        $ref: '#/definitions/Analytics_3'
parameters:
  pageOffset:
    name: page[offset]
    description: start index of the requested page
    required: false
    in: query
    type: integer
    default: 0
  pageLimit:
    name: page[limit]
    description: maximum items in one page
    required: false
    in: query
    type: integer
    default: 10
  sort_2:
    description: 'defines on which attribute the sorting will be done:

      * **analytics.flights.score** - sort destination by flights score (decreasing)

      * **analytics.travelers.score** - sort destination by traveler''s score (decreasing)

      '
    name: sort
    required: false
    in: query
    type: string
    default: analytics.travelers.score
    enum:
    - analytics.flights.score
    - analytics.travelers.score
  sort:
    description: 'defines on which attribute the sorting will be done:

      * analytics.flights.score - sort destinations by flights score (decreasing)

      * analytics.travelers.score - sort destination by traveler''s score (decreasing)

      '
    name: sort
    required: false
    in: query
    type: string
    default: analytics.travelers.score
    enum:
    - analytics.flights.score
    - analytics.travelers.score
  fields:
    name: fields
    required: false
    in: query
    type: string
    description: "list of attributes desired in the response or list of attributes to remove from the response (with \"-\" before fields) \n* The attributes names must contain the whole path (except resource name) e.g. travelers"
