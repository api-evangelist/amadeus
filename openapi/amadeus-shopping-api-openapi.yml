      currencyCode:
        type: string
        pattern: '[A-Z]{3}'
        description: currency code of the fee in [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) format, e.g. USD, EUR
        example: EUR
      metricType:
        type: string
        description: type of metric
        enum:
        - MINUTES
        - HOURS
        - DAYS
        - YEARS
        example: MINUTES
      metricMin:
        type: string
        description: metric min value
