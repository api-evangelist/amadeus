  /shopping/flight-offers:
    post:
      tags:
      - Shopping
      operationId: searchFlightOffers
      summary: Amadeus Return List of Flight Offers Based on Posted Searching Criteria.
      parameters:
      - $ref: '#/parameters/getOverride'
      - name: getFlightOffersBody
        description: list of criteria to retrieve a list of flight offers
        in: body
        required: true
        schema:
          $ref: '#/definitions/GetFlightOffersQuery'
      responses:
        '200':
          $ref: '#/responses/returnAirOffers'
        '400':
          $ref: '#/responses/400_Search'
        default:
          $ref: '#/responses/500'
      description: ''
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      tags:
      - Shopping
      operationId: getFlightOffers
      summary: Amadeus Return List of Flight Offers Based on Searching Criteria.
      parameters:
      - name: originLocationCode
        in: query
        description: city/airport [IATA code](http://www.iata.org/publications/Pages/code-search.aspx) from which the traveler will depart, e.g. BOS for Boston
        required: true
        type: string
        pattern: '[A-Z]{3}'
        x-example: SYD
      - name: destinationLocationCode
        in: query
        description: city/airport [IATA code](http://www.iata.org/publications/Pages/code-search.aspx) to which the traveler is going, e.g. PAR for Paris
        required: true
        type: string
        pattern: '[A-Z]{3}'
        x-example: BKK
      - name: departureDate
        in: query
        description: the date on which the traveler will depart from the origin to go to the destination. Dates are specified in the [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) YYYY-MM-DD format, e.g. 2017-12-25
        required: true
        type: string
        format: date
        x-example: '2023-05-02'
      - name: returnDate
        in: query
        description: the date on which the traveler will depart from the destination to return to the origin. If this parameter is not specified, only one-way itineraries are found. If this parameter is specified, only round-trip itineraries are found. Dates are specified in the [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) YYYY-MM-DD format, e.g. 2018-02-28
        required: false
        type: string
        format: date
        x-example: '2026-08-15'
      - name: adults
        in: query
        description: 'the number of adult travelers (age 12 or older on date of departure).


          The total number of seated travelers (adult and children) can not exceed 9.'
        required: true
        type: integer
        minimum: 1
        maximum: 9
        default: 1
        x-example: 1
      - name: children
        in: query
        description: 'the number of child travelers (older than age 2 and younger than age 12 on date of departure) who will each have their own separate seat. If specified, this number should be greater than or equal to 0


          The total number of seated travelers (adult and children) can not exceed 9.'
        required: false
        type: integer
        minimum: 0
        maximum: 9
        x-example: 0
      - name: infants
        in: query
        description: the number of infant travelers (whose age is less or equal to 2 on date of departure). Infants travel on the lap of an adult traveler, and thus the number of infants must not exceed the number of adults. If specified, this number should be greater than or equal to 0
        required: false
        type: integer
        minimum: 0
        maximum: 9
        x-example: 0
      - name: travelClass
        in: query
        description: most of the flight time should be spent in a cabin of this quality or higher. The accepted travel class is economy, premium economy, business or first class. If no travel class is specified, the search considers any travel class
        required: false
        type: string
        enum:
        - ECONOMY
        - PREMIUM_ECONOMY
        - BUSINESS
        - FIRST
        x-example: ECONOMY
      - name: includedAirlineCodes
        in: query
        description: 'This option ensures that the system will only consider these airlines. This can not be cumulated with parameter excludedAirlineCodes.


          Airlines are specified as [IATA airline codes](http://www.iata.org/publications/Pages/code-search.aspx) and are comma-separated, e.g. 6X,7X,8X

          '
        required: false
        type: string
        collectionFormat: csv
        pattern: '[0-9A-Z]{2}'
        x-example: string-value
      - name: excludedAirlineCodes
        in: query
        description: 'This option ensures that the system will ignore these airlines. This can not be cumulated with parameter includedAirlineCodes.


          Airlines are specified as [IATA airline codes](http://www.iata.org/publications/Pages/code-search.aspx) and are comma-separated, e.g. 6X,7X,8X

          '
        required: false
        type: string
        collectionFormat: csv
        pattern: '[0-9A-Z]{2}'
        x-example: string-value
      - name: nonStop
        in: query
        description: if set to true, the search will find only flights going from the origin to the destination with no stop in between
        required: false
        type: boolean
        default: false
        x-example: true
      - name: currencyCode
        in: query
        description: the preferred currency for the flight offers. Currency is specified in the [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) format, e.g. EUR for Euro
        required: false
        type: string
        pattern: '[A-Z]{3}'
        x-example: EUR
      - name: maxPrice
        in: query
        description: maximum price per traveler. By default, no limit is applied. If specified, the value should be a positive number with no decimals
        required: false
        type: integer
        minimum: 1
        x-example: '199.50'
      - name: max
        in: query
        description: maximum number of flight offers to return. If specified, the value should be greater than or equal to 1
        required: false
        type: integer
        minimum: 1
        default: 250
        x-example: 1
      responses:
        '200':
          $ref: '#/responses/GETAirOffersReply'
        '400':
          $ref: '#/responses/400_Search'
        default:
          $ref: '#/responses/500'
      description: ''
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /shopping/hotel-offers:
    get:
      description: ''
      summary: Amadeus GetMultiHotelOffers
      tags:
      - Shopping
      operationId: getMultiHotelOffers
      deprecated: false
      parameters:
      - name: hotelIds
        in: query
        required: true
        type: array
        minItems: 1
        maxItems: 20
        uniqueItems: false
        x-example:
        - MCLONGHM
        items:
          type: string
        description: Amadeus property codes on 8 chars. Mandatory parameter for a search by predefined list of hotels.
      - name: adults
        in: query
        required: false
        default: 1
        type: integer
        format: int32
        minimum: 1
        maximum: 9
        exclusiveMaximum: false
        exclusiveMinimum: false
        description: Number of adult guests (1-9) per room.
        x-example: 1
      - name: checkInDate
        in: query
        required: false
        type: string
        format: date
        description: Check-in date of the stay (hotel local date). Format YYYY-MM-DD. The lowest accepted value is the present date (no dates in the past). If not present, the default value will be today's date in the GMT time zone.
        x-example: '2023-11-22'
      - name: checkOutDate
        in: query
        required: false
        type: string
        format: date
        description: Check-out date of the stay (hotel local date). Format YYYY-MM-DD. The lowest accepted value is checkInDate+1. If not present, it will default to checkInDate +1.
        x-example: '2026-08-15'
      - name: countryOfResidence
        in: query
        required: false
        type: string
        pattern: '[A-Z]{2}'
        description: Code of the country of residence of the traveler expressed using ISO 3166-1 format.
        x-example: 1
      - name: roomQuantity
        in: query
        required: false
        default: 1
        type: integer
        format: int32
        minimum: 1
        maximum: 9
        exclusiveMaximum: false
        exclusiveMinimum: false
        description: Number of rooms requested (1-9).
        x-example: 1
      - name: priceRange
        in: query
        required: false
        type: string
        description: 'Filter hotel offers by price per night interval (ex: 200-300 or -300 or 100).

          It is mandatory to include a currency when this field is set.'
        x-example: '199.50'
      - name: currency
        in: query
        required: false
        type: string
        pattern: ^[A-Z]{3}$
        description: 'Use this parameter to request a specific currency. ISO currency code (http://www.iso.org/iso/home/standards/currency_codes.htm).

          If a hotel does not support the requested currency, the prices for the hotel will be returned in the local currency of the hotel.'
        x-example: EUR
      - name: paymentPolicy
        in: query
        required: false
        enum:
        - GUARANTEE
        - DEPOSIT
        - NONE
        default: NONE
        type: string
        description: Filter the response based on a specific payment type. NONE means all types (default).
        x-example: GUARANTEE
      - name: boardType
        in: query
        required: false
        enum:
        - ROOM_ONLY
        - BREAKFAST
        - HALF_BOARD
        - FULL_BOARD
        - ALL_INCLUSIVE
        type: string
        description: "Filter response based on available meals:\n        * ROOM_ONLY = Room Only\n        * BREAKFAST = Breakfast\n        * HALF_BOARD = Diner & Breakfast (only for Aggregators)\n        * FULL_BOARD = Full Board (only for Aggregators)\n        * ALL_INCLUSIVE = All Inclusive (only for Aggregators)"
        x-example: ROOM_ONLY
      - name: includeClosed
        in: query
        required: false
        type: boolean
        description: Show all properties (include sold out) or available only. For sold out properties, please check availability on other dates.
        x-example: true
      - name: bestRateOnly
        in: query
        required: false
        default: true
        type: boolean
        description: Used to return only the cheapest offer per hotel or all available offers.
        x-example: true
      - name: lang
        in: query
        required: false
        type: string
        pattern: ^[a-zA-Z0-9-]{2,5}$
        description: "Requested language of descriptive texts. \nExamples: FR , fr , fr-FR.\nIf a language is not available the text will be returned in english.\nISO language code (https://www.iso.org/iso-639-language-codes.html)."
        x-example: EN
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/MultiResponse'
        '400':
          description: 'Bad request:


            | Code | Title  |

            |-----|-----|

            | 23   | PASSENGER TYPE NOT SUPPORTED   |

            | 61 | INVALID CURRENCY CODE|

            | 137 | INVALID ADULTS OCCUPANCY REQUESTED|

            | 145 | DURATION PERIOD OR DATES INCORRECT|

            | 195 | SERVICE RESTRICTION|

            | 249 | INVALID RATE CODE|

            | 377 | MAX STAY DURATION IS EXCEEDED|

            | 381 | INVALID CHECK-IN DATE|

            | 382 | INVALID CHECK-OUT DATE|

            | 383 | INVALID CITY CODE|

            | 392 | INVALID HOTEL CODE|

            | 397 | INVALID NUMBER OF ADULTS|

            | 400 | INVALID PROPERTY CODE|

            | 404 | CHECK_OUT DATE MUST BE FURTHER IN THE FUTURE THAN CHECK-IN DATE|

            | 424 | NO HOTELS FOUND WHICH MATCH THIS INPUT|

            | 431 | CHECK-OUT DATE IS TOO FAR IN THE FUTURE THAN CHECK-IN DATE|

            | 424 | NO HOTELS FOUND WHICH MATCH THIS INPUT|

            | 431 | CHECK-OUT DATE IS TOO FAR IN THE FUTURE|

            | 450 | INVALID PROVIDER RESPONSE|

            | 451 | INVALID CREDENTIALS|

            | 562 | RESTRICTED ACCESS FOR THE REQUESTED RATES AND CHAINS|

            | 784 | PROVIDER TIME OUT|

            | 790 | RATE SECURITY NOT LOADED| '
          schema:
            $ref: '#/definitions/Errors'
        '500':
          description: Internal server error.
          schema:
            $ref: '#/definitions/Errors'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /shopping/hotel-offers/{offerId}:
    get:
      description: ' '
      summary: Amadeus GetOfferPricing
      tags:
      - Shopping
      operationId: getOfferPricing
      deprecated: false
      parameters:
      - name: offerId
        in: path
        required: true
        type: string
        pattern: ^[A-Z0-9]*$
        x-example: TSXOJ6LFQ2
        description: Unique identifier of an offer. Either the GDS booking code or the aggregator offerId with a limited lifetime.
      - name: lang
        in: query
        required: false
        type: string
        pattern: ^[a-zA-Z0-9-]{2,5}$
        description: "Requested language of descriptive texts. \nExamples: FR , fr , fr-FR.\nIf a language is not available the text will be returned in english.\nISO language code (https://www.iso.org/iso-639-language-codes.html)."
        x-example: EN
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PricingResponse'
        '400':
          description: 'Bad Request:

            code| title

            ------- | -------------------------------------

            23 | PASSENGER TYPE NOT SUPPORTED

            61 |INVALID CURRENCY CODE

            137 | INVALID ADULTS OCCUPANCY REQUESTED

            145 | DURATION PERIOD OR DATES INCORRECT

            195 | SERVICE RESTRICTION

            249 | INVALID RATE CODE

            377 | MAX STAY DURATION IS EXCEEDED

            381 | INVALID CHECK-IN DATE

            382 | INVALID CHECK-OUT DATE

            383 | INVALID CITY CODE

            392 | INVALID HOTEL CODE

            397 | INVALID NUMBER OF ADULTS

            400 | INVALID PROPERTY CODE

            402 | INVALID ROOM TYPE

            404 | CHECK_OUT DATE MUST BE FURTHER IN THE FUTURE THAN CHECK-IN DATE

            424 | NO HOTELS FOUND WHICH MATCH THIS INPUT

            431 | CHECK-OUT DATE IS TOO FAR IN THE FUTURE

            450 | INVALID PROVIDER RESPONSE

            451 | INVALID CREDENTIAL

            562 | RESTRICTED ACCESS FOR THE REQUESTED RATES AND CHAINS

            784 | PROVIDER TIME OUT

            790 | NO PROPERTIES FOUND WITHIN THIS RADIUS

            795 | NO SIMILAR NAME FOUND, PLEASE ENLARGE YOUR SEARCH CRITERIA

            842 | RATE SECURITY NOT LOADED'
          schema:
            $ref: '#/definitions/Errors'
        '404':
          description: Hotel or offer not found
          schema:
            $ref: '#/definitions/Errors'
        '500':
          description: Internal server error.
          schema:
            $ref: '#/definitions/Errors'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /shopping/transfer-offers:
    post:
      tags:
      - Shopping
      operationId: getTransferOffers
      summary: Amadeus Gets Transfer Offers.
      parameters:
      - name: body
        in: body
        required: true
        schema:
          title: Body_TransferOffers
          type: object
          required:
          - startDateTime
          - startLocationCode
          properties:
            startDateTime:
              description: date and time specified in the [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) YYYY-MM-DDThh:mm:ss format e.g. 2017-11-10T10:00:00
              type: string
            passengers:
              description: the number of passengers, e.g. 3. Default value is 1
              type: integer
              default: 1
            startLocationCode:
              description: location from [IATA table codes](http://www.iata.org/publications/Pages/code-search.aspx), e.g. CDG. Location could be defined either using location code or address (address line, zip code, country code, city, geo code)
              type: string
            startUicCode:
              description: UIC code defined by the worldwide railway organization e.g. 8600626
              type: string
            startAddressLine:
              description: street address including building number, e.g. 5 Avenue Anatole France
              type: string
            startZipCode:
              description: postal/zip code, e.g. 75007
              type: string
            startCountryCode:
              description: country of the pick-up location with [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) format (e.g. US)
              type: string
            startCityName:
              description: city name, e.g. Paris
              type: string
            startStateCode:
              description: state code according to [ISO 3166-2](https://en.wikipedia.org/wiki/ISO_3166-2)
              type: string
            startGeoCode:
              description: 'latitude and longitude of geographical location following the structure {latitude},{longitude}

                Example: 48.858093,2.294694'
              type: string
            startName:
              description: place name e.g. Airport Name, Hotel Name etc.
              type: string
            startGooglePlaceId:
              description: google place id only for google address e.g. ChIJL-DOWeBv5kcRfTbh97PimNc.
              type: string
            endLocationCode:
              description: "location from [IATA table codes](http://www.iata.org/publications/Pages/code-search.aspx). Optional, for transferType = HOURLY. \nEnd location must be defined either using code (location code, UIC code, or GooglePlaceId) or address (address line, zip code, country code, city, geo code)"
              type: string
              example: CDG
            endUicCode:
              description: "UIC code defined by the worldwide railway organization. \nEnd location must be defined either using code (location code, UIC code, or GooglePlaceId) or address (address line, zip code, country code, city, geo code)"
              type: string
              example: '8600626'
            endAddressLine:
              description: "street address, e.g. 5 Avenue Anatole France. \nEnd location must be defined either using code (location code, UIC code, or GooglePlaceId) or address (address line, zip code, country code, city, geo code)"
              type: string
            endZipCode:
              description: postal/zip code
              type: string
              example: '75007'
            endCountryCode:
              description: country of the location with [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) format
              type: string
              example: US
            endCityName:
              description: city name
              type: string
              example: Paris
            endStateCode:
              description: state code according to [ISO 3166-2](https://en.wikipedia.org/wiki/ISO_3166-2)
              type: string
            endGeoCode:
              description: 'latitude and longitude of geographical location following the structure {latitude},{longitude}

                Example: 48.858093,2.294694'
              type: string
            endName:
              description: place name e.g. Airport Name, Hotel Name etc.
              type: string
            endGooglePlaceId:
              description: "google place id only for google address. \nEnd location must be defined either using code (location code, UIC code, or GooglePlaceId) or address (address line, zip code, country code, city, geo code)"
              type: string
              example: ChIJL-DOWeBv5kcRfTbh97PimNc
            transferType:
              type: string
              enum:
              - PRIVATE
              - SHARED
              - TAXI
              - HOURLY
              - AIRPORT_EXPRESS
              - AIRPORT_BUS
              description: 'a transfer service type

                Example: PRIVATE


                value           | description

                --------------  | ------------------------

                PRIVATE         | Private transfer from point to point

                SHARED          | Shared transfer from point to point

                TAXI            | Taxi reservation from point to point, price is estimated

                HOURLY          | Chauffeured driven transfer per hour

                AIRPORT_EXPRESS | Express Train from/to Airport

                AIRPORT_BUS     | Express Bus from/to Airport


                If not filled, all transfer service types are requested

                '
            duration:
              description: transfer duration in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) PnYnMnDTnHnMnS format, e.g. PT2H10M. It is used and mandatory for transferType = HOURLY
              type: string
            language:
              description: code of the preferred language to be used in [ISO 639-1 alpha-2](https://en.wikipedia.org/wiki/ISO_639-1) format, e.g. EN
              type: string
              default: EN
            currency:
              description: the preferred currency for the transfer offers. Currency is specified in the [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) format, e.g. EUR for Euro
              type: string
            vehicleCategory:
              type: string
              enum:
              - ST
              - BU
              - FC
              description: 'a vehicle category

                Example: BU


                code  | name

                ----- | -------------------------------------

                ST    | Standard Class

                BU    | Business Class

                FC    | First Class


                If not filled, all vehicle categories are requested

                '
            vehicleCode:
              type: string
              enum:
              - MBR
              - CAR
              - SED
              - WGN
              - ELC
              - VAN
              - SUV
              - LMS
              - TRN
              - BUS
              description: 'a vehicle type code

                Example: VAN


                code   | name

                ------ | -------------------------------------

                MBK    | Motorcycle

                CAR    | Car

                SED    | Sedan

                WGN    | Wagon

                ELC    | Electric car

                VAN    | Van or minivan

                SUV    | Sport utility vehicle

                LMS    | Limousine

                TRN    | Train

                BUS    | Bus


                If not filled, all vehicle types are requested

                '
            providerCodes:
              description: 'transfer provider codes, comma-separated. If not filled, the request is sent to all providers

                Example: TXO,FGT'
              type: string
            baggages:
              description: the number of baggages to be supported by the vehicle. If specified, this number should be greater than or equal to 0
              type: integer
            discountNumbers:
              type: string
              description: 'transfer provider discount numbers, which could be used to get negotiated or discounted rates. Comma separated array with the following structure: {providerCode}|{discountType}|{discountNumber}.

                Example: ABC|CD|1122-DD-22, where providerCode=ABC, discountType=CD and discountNumber=1122-DD-22

                Accepted discountType:  "CD" for corporate discount code, "PC" for promotional/campaign discount code'
            extraServiceCodes:
              type: string
              description: 'a comma-separated list of extra service codes

                Example: EWT,MAG,FLM


                code   | name

                ------ | ----------------------------

                DSL    | Driver language specified

                EWT    | Extra waiting time

                MAG    | Meet & Greet

                FLM    | Flight monitoring

                NWS    | Newspaper

                CAI    | Cancellation insurance

                WNR    | Wait and Return. Driver waits at destination and brings back the customer to pick-up point'
            equipmentCodes:
              type: string
              description: "a comma-separated list of extra equipment codes\nExample: CBS,BYC\n\ncode   | name\n------ | -------------------------------------\nBBS    | Baby stroller/Push chair\nBYC    | Bicycle rack\nCBB    | Cargo barrier rack\nCBF    | Cargo barrier front\nCBS    | Booster seat for child under 135cm or up to 12 years\nCSB    | Child seat determined by weight/age of child 1-3 years / 9-18 Kg\nCSI    | Child seat determined by weight/age of child 0-12 month/0-13Kg\nCST    | Child seat determined by weight/age of child 4-7 years/15 – 30 Kg\nSBR    | Snow board racks\nSKB    | Ski box\nSKR    | Ski rack\nTAB    | Travel Tablet \nWAR    | Wheelchair access ramp\nWHC    | Wheelchair\nWIF    | Wi-Fi access\nCNT    | Charger cable\n"
            reference:
              description: reference of the Trip e.g. YNK4JQ
              type: string
            stopOvers:
              type: array
              description: Location of the stop over or the several stop over points. It can be defined either using IATA code or Address (address line, zip, country, city, state, latitude, longitude). Vehicle change via stop overs is not supported.
              items:
                $ref: '#/definitions/StopOverRequest'
            startConnectedSegment:
              $ref: '#/definitions/TravelSegment'
            endConnectedSegment:
              $ref: '#/definitions/TravelSegment'
            passenegerCharacteristics:
              type: array
              description: Describes passenger typeCode and their age.
              items:
                $ref: '#/definitions/PassengerCharacteristics'
          example: &id003
            startLocationCode: CDG
            endAddressLine: Avenue Anatole France, 5
            endCityName: Paris
            endZipCode: '75007'
            endCountryCode: FR
            endName: Souvenirs De La Tour
            endGeoCode: 48.859466,2.2976965
            transferType: PRIVATE
            startDateTime: '2024-04-10T10:30:00'
            passengers: 2
            stopOvers:
            - duration: PT2H30M
              sequenceNumber: 1
              addressLine: Avenue de la Bourdonnais, 19
              countryCode: FR
              cityName: Paris
              zipCode: '75007'
              name: De La Tours
              geoCode: 48.859477,2.2976985
              stateCode: FR
            startConnectedSegment:
              transportationType: FLIGHT
              transportationNumber: AF380
              departure:
                localDateTime: '2024-04-10T09:00:00'
                iataCode: NCE
              arrival:
                localDateTime: '2024-04-10T10:00:00'
                iataCode: CDG
            passengerCharacteristics:
            - passengerTypeCode: ADT
              age: 20
            - passengerTypeCode: CHD
              age: 10
        x-example: *id003
      responses:
        '200':
          $ref: '#/responses/transfer_offers_post'
        '400':
          $ref: '#/responses/400_postTransferOffers'
        '401':
          $ref: '#/responses/401'
        default:
          $ref: '#/responses/500_2'
      description: ''
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
definitions:
  Coverage:
    description: part of the trip covered by the travel class restriction (ALL_SEGMENTS if ommited)
    type: string
    enum:
    - MOST_SEGMENTS
    - AT_LEAST_ONE_SEGMENT
    - ALL_SEGMENTS
    example: MOST_SEGMENTS
  HotelProduct_RoomDetails:
    title: HotelProduct_RoomDetails
    type: object
    properties:
      type:
        description: "Room type code, 3 character identifier of the room.\nThe first character identifies the room type category. \nThe second numeric character identifies the number of beds. \nThe third character identifies the bed type. \nThere is a special case where ROH is returned, this value stands for Run Of House."
        type: string
        pattern: ^[A-Z0-9*]{3}$
        example: string-value
      typeEstimated:
        $ref: '#/definitions/HotelProduct_EstimatedRoomType'
      description:
        $ref: '#/definitions/QualifiedFreeText'
  OriginalFlightStop:
    description: details of stops for direct or change of gauge flights
    type: object
    properties:
      iataCode:
        description: '[IATA airline codes](http://www.iata.org/publications/Pages/code-search.aspx)'
        type: string
        example: JFK
      duration:
        type: string
        description: stop duration in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) PnYnMnDTnHnMnS format, e.g. PT2H10M
        example: PT2H10M
  Tax_3:
    description: single tax information
    allOf:
    - type: object
      properties:
        monetaryAmount:
          type: string
          example: '10.5'
    - type: object
      properties:
        indicator:
          type: string
          description: Tax category
        natureCode:
          type: string
          description: Tax code
        countryCode:
          type: string
          description: Tax iso country code
        rate:
          type: string
          description: Tax rate
  HotelProduct_HotelPrice:
    title: HotelProduct_HotelPrice
    description: price information
    type: object
    properties:
      currency:
        description: currency Code apply to all elements of the price
        type: string
        example: EUR
      sellingTotal:
        description: sellingTotal = Total + margins + markup + totalFees - discounts
        type: string
        example: '199.50'
      total:
        description: total = base + totalTaxes
        type: string
        example: '199.50'
      base:
        type: string
        example: string-value
      taxes:
        type: array
        items:
          $ref: '#/definitions/Tax_2'
      markups:
        type: array
        items:
          $ref: '#/definitions/Markup'
      variations:
        $ref: '#/definitions/HotelProduct_PriceVariations'
  Payment:
    type: object
    properties:
      brand:
        $ref: '#/definitions/PaymentBrand'
      binNumber:
        description: The first 6 digits of the credit card
        type: integer
        example: 123456
        pattern: '[0-9]{6}'
      flightOfferIds:
        description: Id of the flightOffers to pay
        type: array
        minItems: 1
        maxItems: 6
        items:
          type: string
        example: '1'
  CancellationType:
    title: CancellationType
    description: '* FULL_STAY: the Penalty amount equals the `total` price.'
    type: string
    enum:
    - FULL_STAY
  Issue:
    type: object
    properties:
      status:
        description: the HTTP status code applicable to this error
        type: integer
        example: 1
      code:
        description: an application-specific error code
        type: integer
        format: int64
        example: 1
      title:
        description: a short summary of the error
        type: string
        example: string-value
      detail:
        description: explanation of the error
        type: string
        example: string-value
      source:
        type: object
        title: Issue_Source
        description: an object containing references to the source of the error
        maxProperties: 1
        properties:
          pointer:
            description: a JSON Pointer [RFC6901] to the associated entity in the request document
            type: string
            example: string-value
          parameter:
            description: a string indicating which URI query parameter caused the issue
            type: string
            example: string-value
          example:
            description: a string indicating an example of the right value
            type: string
            example: string-value
  Issue_2:
    properties:
      status:
        description: the HTTP status code applicable to this error
        type: integer
        example: 1
      code:
        description: an application-specific error code
        type: integer
        format: int64
        example: 1
      title:
        description: a short summary of the error
        type: string
        example: string-value
      detail:
        description: explanation of the error
        type: string
        example: string-value
      source:
        type: object
        title: Issue_Source
        description: an object containing references to the source of the error
        maxProperties: 1
        properties:
          pointer:
            description: a JSON Pointer [RFC6901] to the associated entity in the request document
            type: string
            example: string-value
          parameter:
            description: a string indicating which URI query parameter caused the issue
            type: string
            example: string-value
          example:
            description: a string indicating an example of the right value
            type: string
            example: string-value
  Seat:
    type: object
    properties:
      count:
        type: integer
        description: seat capacity
        example: 3
      row:
        type: string
        description: seat row
        example: front
      size:
        type: string
        description: seat size
        example: XL
  ServiceName:
    description: type of service
    type: string
    enum:
    - PRIORITY_BOARDING
    - AIRPORT_CHECKIN
    example: PRIORITY_BOARDING
  FlightOfferPricingIn:
    title: FlightOfferPricing-Input
    type: object
    description: input parameter to price flight offers element
    required:
    - type
    - flightOffers
    properties:
      type:
        description: the resource name
        type: string
        example: flight-offer-pricing
      flightOffers:
        description: list of flight offer to price
        type: array
        minItems: 1
        maxItems: 6
        items:
          $ref: '#/definitions/FlightOffer'
      payments:
        description: payment information for retrieve eventual credit card fees
        type: array
        maxItems: 6
        items:
          title: Payment
          type: object
          properties:
            brand:
              $ref: '#/definitions/PaymentBrand'
            binNumber:
              description: The first 6 digits of the credit card
              type: integer
              example: 123456
              pattern: '[0-9]{6}'
            flightOfferIds:
              description: Id of the flightOffers to pay
              type: array
              minItems: 1
              maxItems: 6
              items:
                type: string
              example: '1'
      travelers:
        description: list of travelers
        type: array
        maxItems: 18
        items:
          $ref: '#/definitions/Traveler'
  FlightEndPoint:
    title: FlightEndPoint
    description: departure or arrival information
    allOf:
    - $ref: '#/definitions/OriginalFlightEndPoint'
    - type: object
      properties:
        at:
          description: local date and time in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) YYYY-MM-ddThh:mm:ss format, e.g. 2017-02-10T20:40:00
          type: string
          format: date-time
          example: '2017-10-23T20:00:00'
  GetFlightOffersQuery:
    title: getFlightOffersQuery
    required:
    - originDestinations
    - travelers
    - sources
    properties:
      currencyCode:
        type: string
        description: The currency code, as defined in [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217), to reflect the currency in which this amount is expressed.
        example: EUR
      originDestinations:
        title: originDestinations
        description: Origins and Destinations must be properly ordered in time (chronological order in accordance with the timezone of each location) to describe the journey consistently. Dates and times must not be past nor more than 365 days in the future, according to provider settings.Number of Origins and Destinations must not exceed the limit defined in provider settings.
        type: array
        minItems: 1
        maxItems: 6
        items:
          $ref: '#/definitions/OriginDestination'
      travelers:
        title: travelers
        description: "travelers in the trip. \n\n Maximum number of passengers older than 2 yo (CHILD, ADULT, YOUGHT): 9.\n Each adult can travel with one INFANT so maximum total number of passengers: 18"
        type: array
        minItems: 1
        maxItems: 18
        items:
          $ref: '#/definitions/Extended_TravelerInfo'
      sources:
        title: sources
        description: Allows enable one or more sources. If present in the list, these sources will be called by the system.
        type: array
        minItems: 1
        items:
          $ref: '#/definitions/FlightOfferSource'
      searchCriteria:
        $ref: '#/definitions/SearchCriteria'
    example:
      currencyCode: USD
      originDestinations:
      - id: '1'
        originLocationCode: NYC
        destinationLocationCode: MAD
        departureDateTimeRange:
          date: '2023-11-01'
          time: '10:00:00'
      travelers:
      - id: '1'
        travelerType: ADULT
      sources:
      - GDS
      searchCriteria:
        maxFlightOffers: 2
        flightFilters:
          cabinRestrictions:
          - cabin: BUSINESS
            coverage: MOST_SEGMENTS
            originDestinationIds:
            - '1'
  Error_400_2:
    properties:
      errors:
        type: array
        items:
          $ref: '#/definitions/Issue_2'
    required:
    - errors
    example:
      errors:
      - status: 400
        code: 477
        title: INVALID FORMAT
        detail: invalid query parameter format
        source:
          parameter: airport
          example: CDG
  AdditionalServiceType:
    type: string
    description: additional service type
    enum:
    - CHECKED_BAGS
    - MEALS
    - SEATS
    - OTHER_SERVICES
    example: CHECKED_BAGS
  DocumentType:
    type: string
    description: the nature/type of the document
    enum:
    - VISA
    - PASSPORT
    - IDENTITY_CARD
    - KNOWN_TRAVELER
    - REDRESS
    example: VISA
  TravelerType:
    type: string
