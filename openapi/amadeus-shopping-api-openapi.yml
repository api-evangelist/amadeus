  HotelProduct_PriceVariation:
    title: HotelProduct_PriceVariation
    description: Some prices may vary during a stay, thus here you can see the daily price per period of the stay
    type: object
    properties:
      startDate:
        description: 'Begin date of the period

          Format: YYYY-MM-DD'
        type: string
        format: date
        example: '2026-08-15'
      endDate:
        description: 'End date of the period

          Format: YYYY-MM-DD'
        type: string
        format: date
        example: '2026-08-15'
      currency:
        description: currency Code apply to all elements of the price
        type: string
        example: EUR
      sellingTotal:
        description: sellingTotal = Total + margins + markup + totalFees - discounts
        type: string
        example: '199.50'
      total:
        description: total = base + totalTaxes
        type: string
        example: '199.50'
      base:
        type: string
        example: string-value
      markups:
        type: array
        items:
          $ref: '#/definitions/Markup'
    required:
    - startDate
    - endDate
  PricingOptionsFareType:
    type: array
    description: type of fare of the flight-offer
    items:
      type: string
      enum:
      - PUBLISHED
      - NEGOTIATED
      - CORPORATE
    example:
    - PUBLISHED
  Discount:
    title: Discount
    description: traveler discount
    type: object
    properties:
      subType:
        $ref: '#/definitions/DiscountType'
      cityName:
        type: string
        description: city of residence
        example: MADRID
      travelerType:
        $ref: '#/definitions/DiscountTravelerType'
      cardNumber:
        type: string
        description: resident card number
        example: 12568215Z
        pattern: '[0-9A-Z][0-9]{0,12}[A-Z]'
      certificateNumber:
        type: string
        description: resident certificate number
        example: 12568215Z
        pattern: '[0-9A-Z][0-9]{0,12}[A-Z]'
  ChargeableSeat:
    description: Details of chargeable seat
    type: object
    properties:
      id:
        description: Id of the chargeable seat
        type: string
        example: '1'
      number:
        type: string
        description: seat number
        example: 33D
        pattern: '[1-9][0-9]{0,2}[A-Z]?'
  DateTimeRange:
    title: dateTimeRange
    allOf:
    - $ref: '#/definitions/DateTimeType'
    - type: object
      properties:
        dateWindow:
          description: 'Either 1, 2 or 3 extra days around the local date (IxD for +/- x days - Ex: I3D), Either 1 to 3 days after the local date (PxD for +x days - Ex: P3D), or 1 to 3 days before the local date (MxD for -x days - Ex: M3D)


            Can not be combined with "originRadius" or "destinationRadius".

            '
          type: string
          example: I3D
          pattern: ^[MPI][1-3]D
        timeWindow:
          description: '1 to 12 hours around (both +and -) the local time. Possibly limited by the number of extra days when specified, i.e.  in some situations, it may not be used to exceed the maximum date range. [1-12]H format, e.g. 6H


            Can not be combined with "originRadius" or "destinationRadius".

            '
          type: string
          example: 2H
          pattern: ^([1-9]|10|11|12)H
    required:
    - date
  LoyaltyProgram:
    title: LoyaltyProgram
    description: loyalty program information
    type: object
    properties:
      programOwner:
        type: string
        description: loyalty program airline code
        example: AF
      id:
        type: string
        description: loyalty program number
        example: '12357466574'
  ServiceProvider:
    type: object
    description: information about provider
    required:
    - code
    - name
    - logoUrl
    properties:
      code:
        type: string
        pattern: '[a-zA-Z]{3}'
        description: provider code
        example: string-value
      name:
        type: string
        pattern: '[a-zA-Z]{30}'
        description: provider name
        example: Sample Name
      logoUrl:
        type: string
        description: URL to provider logo
        example: https://example.com/resource
      termsUrl:
        type: string
        description: URL to provider's terms and conditions page
        example: https://example.com/resource
      isPreferred:
        type: boolean
        description: indicates if sub-provider is preferred for the travel-seller
        example: true
      contacts:
        $ref: '#/definitions/ContactWithAddress'
      settings:
        type: array
        description: list of provider settings
        items:
          type: string
          description: provider setting
          enum:
          - BILLING_ADDRESS_REQUIRED
          - FLIGHT_NUMBER_REQUIRED
          - CVV_NUMBER_REQUIRED
      businessIdentification:
        description: Information about the Customer stakeholder participating to the described sales summary.
        properties:
          vatRegistrationNumber:
            type: string
            description: VAT (Value Added Tax) Registration Number of the customer applicable ot the current sales.
        example: string-value
  EmergencyContact:
    type: object
    description: emergency contact number
    properties:
      addresseeName:
        type: string
        description: Adressee name (e.g. in case of emergency purpose it corresponds to name of the person to be contacted).
        pattern: '[a-zA-Z -]'
        example: Sample Name
      countryCode:
        type: string
        description: Country code of the country (ISO3166-1). E.g. "US" for the United States
        pattern: '[A-Z]{2}'
        example: FR
      number:
        type: string
        description: Phone number. Composed of digits only. The number of digits depends on the country.
        pattern: '[0-9]{1,15}'
        example: 1
      text:
        type: string
        description: additional details
        example: string-value
  FeeType:
    type: string
    description: type of fee
    enum:
    - TICKETING
    - FORM_OF_PAYMENT
    - SUPPLIER
    example: TICKETING
  AircraftEquipment:
    description: information related to the aircraft
    properties:
      code:
        type: string
        description: 'IATA aircraft code (http://www.flugzeuginfo.net/table_accodes_iata_en.php)

          '
        pattern: '[a-zA-Z0-9]{3}'
        example: '318'
  Collection_Meta_Link:
    type: object
    title: Collection_Meta
    properties:
      count:
        type: integer
        example: 1
      links:
        type: object
        title: CollectionLinks
        properties:
          self:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          next:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          previous:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          last:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          first:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
          up:
            type: string
            format: uri
            example: https://test.api.amadeus.com/v1/area/resources?...
        example:
          self: https://test.api.amadeus.com/v1/area/resources?param=value
  Error_401:
    properties:
      errors:
        type: array
        items:
          $ref: '#/definitions/Issue_3'
