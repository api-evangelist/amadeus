  Vehicle:
    type: object
    required:
    - code
    - category
    - description
    - seats
    properties:
      code:
        type: string
        enum:
        - CAR
        - SED
        - WGN
        - ELC
        - VAN
        - SUV
        - LMS
        - MBR
        - TRN
        - BUS
        description: 'vehicle type, which can take following values


          value           | description

          --------------  | ------------------------

          CAR             | Car

          SED             | Sedan

          WGN             | Wagon

          ELC             | Electric car

          VAN             | Van or minivan

          SUV             | Sport utility vehicle

          LMS             | Limousine

          MBR             | Motorbike

          TRN             | Train

          BUS             | Bus

          '
        example: CAR
      category:
        type: string
        enum:
        - ST
        - BU
        - FC
        description: 'category of the vehicle, which can take following values


          value           | description

          --------------  | ------------------------

          ST              | Standard

          BU              | Business

          FC              | First class

          '
        example: ST
      description:
        type: string
        description: description of the vehicle. Can describe a list of potential vehicles, e.g. VW Polo or similar
        example: Sample description text.
      seats:
        type: array
        items:
          $ref: '#/definitions/Seat'
      baggages:
        type: array
        items:
          $ref: '#/definitions/Baggage'
      imageURL:
        type: string
        description: URL to vehicle image
        example: https://example.com/resource
  Dictionaries:
    type: object
    properties:
      locations:
        $ref: '#/definitions/LocationEntry'
      aircraft:
        $ref: '#/definitions/AircraftEntry'
      currencies:
        $ref: '#/definitions/CurrencyEntry'
      carriers:
        $ref: '#/definitions/CarrierEntry'
  FlightOfferUpsellIn:
    title: FlightOfferUpsell-Input
    type: object
    description: input parameter to upsell flight offers element
    required:
    - type
    - flightOffers
    properties:
      type:
        description: the resource name
        type: string
        example: flight-offer-upsell
      flightOffers:
        description: list of flight offer to price
        type: array
        minItems: 1
        maxItems: 6
        items:
          $ref: '#/definitions/FlightOffer'
      payments:
        description: payment information for retrieve eventual credit card fees
        type: array
        maxItems: 6
        items:
          $ref: '#/definitions/Payment'
  ConnectionRestriction:
    description: Restriction towards number of connections.
    type: object
    properties:
      maxNumberOfConnections:
        description: The maximal number of connections for each itinerary. Value can be 0, 1 or 2.
        type: number
        example: 2
      nonStopPreferred:
        description: When this option is requested, recommendations made of Non-Stop flights only are favoured by the search, on the whole itinerary, with a weight of 75%.
        type: boolean
        example: false
      airportChangeAllowed:
        description: Allow to change airport during connection
        type: boolean
        example: false
      technicalStopsAllowed:
        description: This option allows the single segment to have one or more intermediate stops (technical stops).
        type: boolean
        example: true
  HotelProduct_EstimatedRoomType:
    title: HotelProduct_EstimatedRoomType
    description: estimated room category, bed type and number of beds in the room. This information has been parsed from the room description, and is thus only provided for informational purposes
    type: object
    properties:
      category:
        description: Category code
        type: string
        example: string-value
      beds:
        description: Number of beds in the room (1-9)
        type: integer
        format: int32
        example: 1
      bedType:
        description: Type of the bed
        type: string
        example: string-value
  Issue_3:
    properties:
      status:
        description: the HTTP status code applicable to this error
        type: integer
        example: 1
      code:
        description: an application-specific error code
        type: integer
        format: int64
        example: 1
      title:
        description: a short summary of the error
        type: string
        example: string-value
      detail:
        description: explanation of the error
        type: string
        example: string-value
      source:
