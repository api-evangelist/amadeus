  Method:
    title: Method
    description: "The Payment Methods\n * CREDIT_CARD (CC) - Payment Cards in `creditCards` are accepted\n * AGENCY_ACCOUNT - Agency Account (Credit Line) is accepted. Agency is Charged at CheckOut\n * TRAVEL_AGENT_ID - Agency IATA/ARC Number is accepted to Guarantee the booking\n * CORPORATE_ID (COR-ID) - Corporate Account is accepted to Guarantee the booking\n * HOTEL_GUEST_ID - Hotel Chain Rewards Card Number is accepted to Guarantee the booking\n * CHECK - Checks are accepted\n * MISC_CHARGE_ORDER - Miscellaneous Charge Order is accepted\n * ADVANCE_DEPOSIT - Cash is accepted for Deposit/PrePay\n * COMPANY_ADDRESS - Company Billing Address is accepted to Guarantee the booking"
    type: string
    enum:
    - CREDIT_CARD
    - AGENCY_ACCOUNT
    - TRAVEL_AGENT_ID
    - CORPORATE_ID
    - HOTEL_GUEST_ID
    - CHECK
    - MISC_CHARGE_ORDER
    - ADVANCE_DEPOSIT
    - COMPANY_ADDRESS
    - VCC_BILLBACK
    - VCC_B2B_WALLET
    - DEFERED_PAYMENT
    - TRAVEL_AGENT_IMMEDIATE
  Price_2:
    title: Price
    description: Price valuation information
    type: object
    properties:
      currency:
        description: currency Code apply to all elements of the price
        type: string
        example: EUR
      sellingTotal:
        description: sellingTotal = Total + margins + markup + totalFees - discounts
        type: string
        example: '199.50'
      total:
        description: total = base + totalTaxes
        type: string
        example: '199.50'
      base:
        type: string
        example: string-value
      markups:
        type: array
        items:
          $ref: '#/definitions/Markup'
  TransferOfferPost:
    description: transfer offer
    allOf:
    - $ref: '#/definitions/TransferOffer'
    - type: object
      properties:
        startConnectedSegment:
          $ref: '#/definitions/TravelSegment'
    - type: object
      properties:
        endConnectedSegment:
          $ref: '#/definitions/TravelSegment'
  StopOverRequest:
    properties:
      duration:
        description: the intermediate stop duration in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) PnYnMnDTnHnMnS format, e.g. PT2H10M
        type: string
        example: PT2H30M
      locationCode:
        type: string
        description: the intermediate stop airport IATA code, e.g. CDG. Location could be defined either using location code or address (address line, zip code, country code, city, geo code)
        pattern: '[A-Za-z]{3}'
        example: CDG
      addressLine:
        type: string
        description: the intermediate stop street address including building number, e.g. 5 Avenue Anatole France
        example: 5 Avenue Anatole France
      countryCode:
        type: string
        description: the intermediate stop country, the location with [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) format (e.g. US)
        pattern: '[A-Za-z]{2}'
        example: US
      cityName:
        type: string
        description: the intermediate stop city name, e.g. Paris
        example: Paris
      zipCode:
        type: string
        description: the intermediate stop postal/zip code, e.g. 75007
        pattern: '[a-zA-Z0-9]{1,20}'
        example: 75007
      googlePlaceId:
        description: the intermediate stop google place id only for google address e.g. ChIJL-DOWeBv5kcRfTbh97PimNc.
        type: string
        example: ChIJrTLr-GyuEmsRBfy61i59si0
      name:
        type: string
        description: the intermediate stop name e.g. Airport Name, Hotel Name etc.
        example: Sample Name
      stateCode:
        type: string
        description: the intermediate stop state code according to [ISO 3166-2](https://en.wikipedia.org/wiki/ISO_3166-2)
        example: string-value
      geoCode:
        type: string
        description: the intermediate stop latitude and longitude of geographical location following the structure {latitude},{longitude} e.g. 48.858093,2.294694
        example: 48.858093,2.294694
      sequenceNumber:
        description: sequence number of the stop e.g. 3
        type: number
        example: 1
      uicCode:
        type: string
        description: UIC code defined by the worldwide railway organization e.g. 8600626
        example: string-value
  ContactPurpose:
    description: the purpose for which this contact is to be used
    type: string
    enum:
    - STANDARD
    - INVOICE
    - STANDARD_WITHOUT_TRANSMISSION
  Error_400:
    type: object
    properties:
      errors:
        type: array
        items:
          $ref: '#/definitions/Issue'
    required:
    - errors
    example:
      errors:
      - status: 400
        code: 477
        title: INVALID FORMAT
        detail: invalid query parameter format
        source:
          parameter: airport
          example: CDG
  HotelProduct_CancellationPolicy:
    title: HotelProduct_CancellationPolicy
    type: object
    properties:
      type:
        $ref: '#/definitions/CancellationType'
      amount:
        description: Amount of the cancellation fee.
        type: string
        pattern: ^\\d+(\\.\\d+)?$
        example: '199.50'
      numberOfNights:
        description: Number of nights due as fee in case of cancellation.
        type: integer
        minimum: 0
        format: int32
        example: 1
      percentage:
        description: Percentage of the total stay amount to be paid in case of cancellation. Value is between 0 and 100.
        type: string
        pattern: ^\\d+(\\.\\d+)?$
        example: 50
      deadline:
        description: 'Represents the deadline after which the penalty applies. DateTime is in ISO 8601 [https://www.w3.org/TR/NOTE-datetime].

          Example: 2010-08-14T12:00:00+01:00

          Example: 2010-08-14T12:00:00Z

          Example: 2010-08-14T12:00:00-01:00

          The value is expressed in the hotel local time zone, with the added time zone difference. So you can compute the deadline in UTC(GMT) if desired.'
        type: string
        format: date-time
        example: '2026-08-15T10:30:00Z'
      description:
        $ref: '#/definitions/QualifiedFreeText'
  Extended_PricingOptions:
    title: pricingOptions
    description: fare filter options
    type: object
    properties:
      includedCheckedBagsOnly:
        type: boolean
        description: If true, returns the flight-offers with included checked bags only
        example: true
      refundableFare:
        type: boolean
        description: If true, returns the flight-offers with refundable fares only
        example: true
      noRestrictionFare:
        type: boolean
        description: If true, returns the flight-offers with no restriction fares only
        example: true
      noPenaltyFare:
        type: boolean
        description: If true, returns the flight-offers with no penalty fares only
        example: true
  IdentityDocument:
    title: traveler documents
    description: documents of the traveler
    allOf:
    - $ref: '#/definitions/Document'
    - type: object
      properties:
        documentType:
          $ref: '#/definitions/DocumentType'
        validityCountry:
          type: string
          description: '[ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) of the country where the document is valid'
          example: IN
          pattern: '[a-zA-Z]{2}'
        birthCountry:
          type: string
          description: '[ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) of the country of birth'
          example: FR
          pattern: '[a-zA-Z]{2}'
        holder:
          type: boolean
          description: boolean to specify if the traveler is the holder of the document
          example: true
  Error_500:
    type: object
    properties:
      errors:
        type: array
        items:
          $ref: '#/definitions/Issue'
    required:
    - errors
    example:
      errors:
      - status: 500
        code: 141
        title: SYSTEM ERROR HAS OCCURRED
  Contact:
    description: contact information
    allOf:
    - $ref: '#/definitions/ContactDictionary'
    - type: object
      properties:
        phones:
          description: Phone numbers
          type: array
          maxItems: 3
          items:
            $ref: '#/definitions/Phone'
        companyName:
          description: Name of the company
          type: string
          example: AMADEUS
        emailAddress:
          type: string
          description: Email address (e.g. john@smith.com)
          example: support@mail.com
  Type:
    title: Type
    description: data type
    type: string
    enum:
    - hotel-offer
  OriginDestinationLight:
    type: object
    properties:
      id:
        type: string
        example: 1
      originLocationCode:
        description: Origin location, such as a city or an airport. Currently, only the locations defined in [IATA](http://www.iata.org/publications/Pages/code-search.aspx) are supported.
        type: string
        example: PAR
      destinationLocationCode:
        description: Destination location, such as a city or an airport. Currently, only the locations defined in [IATA](http://www.iata.org/publications/Pages/code-search.aspx) are supported.
        type: string
        example: NYC
      includedConnectionPoints:
        type: array
        description: List of included connections points. When an includedViaPoints option is specified, all FlightOffer returned must at least go via this Connecting Point. Currently, only the locations defined in IATA are supported. Used only by the AMADEUS provider
        minItems: 1
        maxItems: 2
        items:
          title: code
          type: string
        example:
        - MRS
      excludedConnectionPoints:
        type: array
        description: List of excluded connections points. Any FlightOffer with these connections points will be present in response. Currently, only the locations defined in IATA are supported. Used only by the AMADEUS provider
        minItems: 1
        maxItems: 3
        items:
          title: code
          type: string
        example:
        - MRS
  Quotation:
    description: quotation representing a price valuation and its components. The monetaryAmount at the root are the sum of base and all the taxes/fees/discounts
    allOf:
    - $ref: '#/definitions/PointsAndCash'
    - type: object
      properties:
        currencyCode:
          type: string
          example: USD
        isEstimated:
          type: boolean
          description: indicates if the price is pre-estimated prior to ride. Becomes mandatory for transferType = TAXI
        base:
          description: base price
          allOf:
          - $ref: '#/definitions/PointsAndCash'
        discount:
          description: discount amount of base price
          allOf:
          - $ref: '#/definitions/PointsAndCash'
        taxes:
          description: Taxes breakdown
          type: array
          items:
            $ref: '#/definitions/Tax_3'
        fees:
          description: Fees breakdown
          type: array
          items:
            $ref: '#/definitions/Fee_2'
        totalTaxes:
          $ref: '#/definitions/PointsAndCash'
        totalFees:
          $ref: '#/definitions/PointsAndCash'
  PaymentBrand:
    description: credit card brand
    type: string
    enum:
    - VISA
    - AMERICAN_EXPRESS
    - MASTERCARD
    - VISA_ELECTRON
    - VISA_DEBIT
    - MASTERCARD_DEBIT
    - MAESTRO
    - DINERS
    - MASTERCARD_IXARIS
    - VISA_IXARIS
    - MASTERCARD_AIRPLUS
    - UATP_AIRPLUS
    example: VISA_IXARIS
  ExtraService:
    type: object
    required:
    - code
    properties:
      code:
        type: string
        description: "extra service code, which can take following values\n\ncode   | name                                 \n------ | ---------------------------- \nDSL    | Driver language specified\nEWT    | Extra waiting time\nMAG    | Meet & Greet\nFLM    | Flight monitoring\nNWS    | Newspaper\nCAI    | Cancellation insurance\nWNR    | Wait and Return. Driver waits at destination and brings back the customer to pick-up point\n"
        enum:
        - DSL
        - EWT
        - MAG
        - FLM
        - NWS
        - CAI
        - WNR
        example: DSL
      itemId:
        type: string
        description: extra service identifier
        example: '12345'
      description:
        type: string
        description: extra service description
        example: Sample description text.
      metricType:
        type: string
        description: extra service time metric type
        enum:
        - YEARS
        - DAYS
        - HOURS
        - MINUTES
        example: YEARS
      metricValue:
        type: string
        description: extra service metric value
        example: string-value
      quotation:
        $ref: '#/definitions/Quotation'
      converted:
        $ref: '#/definitions/Quotation'
      isBookable:
        type: boolean
        description: true if extra service is available for booking
        example: true
      taxIncluded:
        type: boolean
        description: true if tax included in extra service price
        example: true
      includedInTotal:
        type: boolean
        description: true if extra service price is included in total transfer amount
        example: '199.50'
  ChargeableCheckdBags:
    description: Details of chargeable checked bags
    allOf:
    - $ref: '#/definitions/BaggageAllowance'
    - type: object
      properties:
        id:
          description: Id of the chargeable bag
          type: string
          example: '1'
  Baggage:
    type: object
    properties:
      count:
        type: integer
        description: baggage capacity
        example: 3
      size:
        type: string
        description: "baggage size\n\ncode   | name                                 \n------ | ---------------------------- \nS \t   | Small\nM \t   | Medium\nL \t   | Large\n"
        enum:
        - S
        - M
        - L
        example: S
  StopOver:
    description: Location of the stop over or the several stop over points. It can be defined either using IATA code or Address (address line, zip, country, city, state, latitude, longitude). Vehicle change via stop overs is not supported.
    properties:
      duration:
        description: transfer stop duration in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) PnYnMnDTnHnMnS format, e.g. PT2H10M.
        type: string
        example: PT2H30M
      sequenceNumber:
        description: sequence number of the stop e.g. 3
        type: number
        example: 1
      location:
        $ref: '#/definitions/Location'
  OriginalFlightEndPoint:
    type: object
    description: departure or arrival information
    properties:
      iataCode:
        description: '[IATA airline codes](http://www.iata.org/publications/Pages/code-search.aspx)'
        type: string
        example: JFK
      terminal:
        description: terminal name / number
        type: string
        example: T2
  ContactWithAddress:
    allOf:
    - $ref: '#/definitions/Contact_2'
    - type: object
      properties:
        address:
          $ref: '#/definitions/AddressCommon'
    description: Contact and Adress details
  HotelOffer:
    title: HotelOffer
    description: Hotel Offer
    type: object
    properties:
      type:
        $ref: '#/definitions/Type'
      id:
        description: Unique identifier of this offer. Might be valid for a temporary period only.
        example: TSXOJ6LFQ2
        type: string
        minLength: 2
        maxLength: 100
        pattern: ^[A-Z0-9]*$
      checkInDate:
        description: 'check-in date of the stay (hotel local date). Format YYYY-MM-DD

          The lowest accepted value is today date (no dates in the past).'
        example: '2020-12-30'
        type: string
        format: date
      checkOutDate:
        description: 'check-out date of the stay (hotel local date). Format YYYY-MM-DD

          The lowest accepted value is `checkInDate`+1.'
        example: '2020-12-31'
        type: string
        format: date
      roomQuantity:
        description: number of rooms (1-9)
        example: '1'
        type: string
      rateCode:
        description: "Special Rate - Provider Response Code (3 chars)\nExamples\n\n  * RAC - Rack\n\n  * BAR - Best Available Rate\n\n  * PRO - Promotional\n\n  * COR - Corporate\n\n  * GOV - Government (qualified)\n\n  * AAA - AAA (qualified)\n\n  * BNB - Bed and Breakfast\n\n  * PKG - Package\n\n  * TVL - Travel Industry\n\n  * SPC - Special Promo Rate\n\n  * WKD - Weekend\n\n  * CON - Convention\n\n  * SNR - Senior (Europe) (qualified)\n\n  * ARP - AARP - American Association of Retired People (50+) (qualified)\n\n  * SRS - Senior (qualified)\n\n  * ROR - Room Only Rate (no breakfast)\n\n  * FAM - Family\n\n  * DAY - Day rate"
        example: RAC
        type: string
        minLength: 3
        maxLength: 3
        pattern: ^[A-Z0-9*]{3}$
      rateFamilyEstimated:
        $ref: '#/definitions/HotelProduct_RateFamily'
      category:
        description: "Special Rate Category\nExamples:\n  ASSOCIATION\n  FAMILY_PLAN"
        example: FAMILY_PLAN
        type: string
      description:
        $ref: '#/definitions/QualifiedFreeText'
      commission:
        $ref: '#/definitions/HotelProduct_Commission'
      boardType:
        $ref: '#/definitions/BoardType'
      room:
        $ref: '#/definitions/HotelProduct_RoomDetails'
      guests:
        $ref: '#/definitions/HotelProduct_Guests'
      price:
        $ref: '#/definitions/HotelProduct_HotelPrice'
      policies:
        $ref: '#/definitions/HotelProduct_PolicyDetails'
      self:
        description: A self link to the object. Use this to refresh the Offer price
        example: https://test.travel.api.amadeus.com/v2/shopping/hotel-offers/63A93695B58821ABB0EC2B33FE9FAB24D72BF34B1BD7D707293763D8D9378FC3
        type: string
    required:
    - id
    - rateCode
    - room
    - price
  PassengerCharacteristics:
    properties:
      passengerTypeCode:
        description: Passenger type codes e.g. CHD , ADT. CHD is for child and ADT for Adult.
        type: string
        example: child
      age:
        type: integer
        description: Age of the Passenger (Mandatory if typeCode= “CHD”)
        example: 12
  SearchCriteria:
    type: object
    properties:
      excludeAllotments:
        description: This option allows to exclude the isAllotment flag associated to a booking class in the search response when it exist.
        type: boolean
        example: false
      addOneWayOffers:
        description: This option allows activate the one-way combinable feature
        type: boolean
        example: true
      maxFlightOffers:
        description: Maximum number of flight offers returned (Max 250)
        type: number
        default: 250
        example: 250
      maxPrice:
        description: maximum price per traveler. By default, no limit is applied. If specified, the value should be a positive number with no decimals
        type: integer
        example: 100
      allowAlternativeFareOptions:
        description: This option allows to default to a standard fareOption if no offers are found for the selected fareOption.
        type: boolean
        example: true
      oneFlightOfferPerDay:
        description: Requests the system to find at least one flight-offer per day, if possible, when a range of dates is specified. Default is false.
        type: boolean
        example: true
      additionalInformation:
        title: AdditionalInformation
        type: object
        properties:
          chargeableCheckedBags:
            description: If true, returns the price of the first additional bag when the airline is an "Amadeus Ancillary Services" member.
            type: boolean
            example: true
          brandedFares:
            description: If true, returns the fare family name for each flight-offer which supports fare family
            type: boolean
            example: true
      pricingOptions:
        $ref: '#/definitions/Extended_PricingOptions'
      flightFilters:
        title: FlightFilters
        $ref: '#/definitions/FlightFilters'
  Extended_TravelerInfo:
    allOf:
    - $ref: '#/definitions/TravelerInfo'
    required:
    - id
    - travelerType
  Equipment:
    type: object
    description: extra equipment information
    required:
    - code
    properties:
      code:
        type: string
        description: "extra equipment codes, which can take following values\n\ncode   | name                                 \n------ | -------------------------------------  \nBBS    | Baby stroller/Push chair\nBYC    | Bicycle rack\nCBB    | Cargo barrier rack\nCBF    | Cargo barrier front\nCBS    | Booster seat for child under 135cm or up to 12 years\nCSB    | Child seat determined by weight/age of child 1-3 years / 9-18 Kg\nCSI    | Child seat determined by weight/age of child 0-12 month/0-13Kg\nCST    | Child seat determined by weight/age of child 4-7 years/15 – 30 Kg\nSBR    | Snow board racks\nSKB    | Ski box\nSKR    | Ski rack\nTAB    | Travel Tablet \nWAR    | Wheelchair access ramp\nWHC    | Wheelchair\nWIF    | Wi-Fi access\nCNT    | Charger cable\n"
        enum:
        - BBS
        - BYC
        - CBB
        - CBF
        - CBS
        - CSB
        - CSI
        - CST
        - SBR
        - SKB
        - SKR
        - 'TAB '
        - WAR
        - WHC
        - WIF
        - CNT
        example: BBS
      itemId:
        type: string
        description: extra equipment identifier
        example: '12345'
      description:
        type: string
        description: extra equipment description
        example: Sample description text.
      quotation:
        $ref: '#/definitions/Quotation'
      converted:
        $ref: '#/definitions/Quotation'
      isBookable:
        type: boolean
        description: true if extra equipment is available for booking
        example: true
      taxIncluded:
        type: boolean
        description: true if tax included in extra equipment price
        example: true
      includedInTotal:
        type: boolean
        description: true if extra equipment price is included in total transfer amount
        example: '199.50'
  Hotel:
    title: Hotel
    description: Hotel Content
    type: object
    properties:
      hotelId:
        description: Amadeus Property Code (8 chars)
        example: ADPAR001
        type: string
        pattern: ^[A-Z0-9]{8}$
      chainCode:
        description: Brand (RT...) or Merchant (AD...) (Amadeus 2 chars Code)
        example: AD
        type: string
        pattern: ^[A-Z]{2}$
      brandCode:
        description: 'Brand (RT...) (Amadeus 2 chars Code). Small Properties distributed by Merchants may not have a Brand.

          Example - AD (Value Hotels) is the Provider/Merchant, and RT (Accor) is the Brand of the Property'
        example: RT
        type: string
        pattern: ^[A-Z]{2}$
      dupeId:
        description: 'Unique Property identifier of the physical hotel.

          One physical hotel can be represented by different Providers, each one having its own `hotelID`.

          This attribute allows a client application to group together hotels that are actually the same.'
        example: '501132260'
        type: string
      name:
        description: Hotel Name
        example: Hotel de Paris
        type: string
      cityCode:
        description: 'Warning: The IATA city code associated to the hotel (not necessary the real Hotel City)'
        example: PAR
        type: string
        pattern: ^[A-Z]{3}$
  FlightStop:
    title: FlightStop
    description: details of stops for direct or change of gauge flights
    allOf:
    - $ref: '#/definitions/OriginalFlightStop'
    - type: object
      properties:
        arrivalAt:
          description: arrival at the stop in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) YYYY-MM-ddThh:mm:ss format, e.g. 2017-02-10T20:40:00
          type: string
          format: date-time
          example: '2017-10-23T20:00:00'
        departureAt:
          description: departure from the stop in [ISO8601](https://en.wikipedia.org/wiki/ISO_8601) YYYY-MM-ddThh:mm:ss format, e.g. 2017-02-10T20:40:00
          type: string
          format: date-time
          example: '2017-10-23T20:00:00'
  Error:
    title: Error
    description: The Error Definition
    type: object
    properties:
      status:
        description: The [HTTP status code](https://www.iana.org/assignments/http-status-codes/http-status-codes.xhtml) of this response. This is present only in terminal errors which cause an unsuccessful response. In the case of multiple errors, they must all have the same status.
        type: integer
        format: int32
        example: 1
      code:
        description: A machine-readable error code from the Amadeus Canned Messages table, that will enable the API Consumers code to handle this type of error
        type: integer
        format: int32
        example: 1
      title:
        description: An error title from the Canned Messages table with a 1:1 correspondence to the error code. This may be localized
        type: string
        example: string-value
      detail:
        description: An easy-to-read explanation specific to this occurrence of the problem. It should give the API consumer an idea of what went wrong and how to recover from it. Like the title, this field’s value can be localized.
        type: string
        example: string-value
      source:
        $ref: '#/definitions/Error_Source'
      documentation:
        description: A link to a web page or file with further documentation to help the API consumer resolve this error
        type: string
        example: string-value
  AircraftEntry:
    additionalProperties:
      description: the manufacturer/model of aircraft
      type: string
  TravelSegment:
    description: A segment of an itinerary used by a traveler between 2 locations at a given date and time using a particular transportation type FLIGHT or TRAIN
    type: object
    properties:
      transportationType:
        $ref: '#/definitions/TransportationType'
      transportationNumber:
        type: string
        example: AF380
        description: The flight number or train number, e.g. AF380
      departure:
        $ref: '#/definitions/TravelSegmentLocation'
      arrival:
        $ref: '#/definitions/TravelSegmentLocation'
  Name:
    title: name
    description: name
    allOf:
    - $ref: '#/definitions/BaseName'
    - type: object
      properties:
        secondLastName:
          description: second last name
          type: string
  Phone:
    type: object
    description: phone information
    properties:
      deviceType:
        $ref: '#/definitions/PhoneDeviceType'
      countryCallingCode:
        type: string
        description: Country calling code of the phone number, as defined by the International Communication Union. Examples - "1" for US, "371" for Latvia.
        pattern: '[0-9+]{2,5}'
        example: 1
      number:
