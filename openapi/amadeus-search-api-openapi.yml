        '400':
          description: "code    | title                                 \n------- | ------------------------------------- \n477     | NOT FOUND \n1797    | INVALID FORMAT\n572     | INVALID LENGTH\n32171   | MANDATORY DATA MISSING \t     \n"
          schema:
            example: &id002
              errors:
              - status: 400
                code: 572
