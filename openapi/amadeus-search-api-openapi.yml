openapi: 3.0.1
info:
  title: Airline Code Lookup air-traffic Search API
  description: 'Before using this API, we recommend you read our

    **[Authorization Guide](https://developers.amadeus.com/self-service/apis-docs/guides/authorization-262)**

    for more information on how to generate an access token.


    Please also be aware that our test environment is based on a subset of the production,

    to see what is included in test please refer to our **[data collection](https://github.com/amadeus4dev/data-collection)**.

    '
  version: 1.2.1
  x-status: validated
  x-tags:
  - '#ama-for-dev'
  x-release-note:
    1.2.0:
    - Migration to OAS3
    1.1.0:
    - Correct example
    - Regroup parameter "IATACode" and "ICAOCode" under the same name "airlineCodes"
    1.0.0:
    - initial version
    - List all airlines information (name and code)
    - Introduction of search per IATA or ICAO code
servers:
- url: https://test.api.amadeus.com/v1
tags:
- name: Search
paths:
  /reference-data/locations/hotel:
    get:
      tags:
      - Search
      summary: Amadeus Returns a List of Hotels Matching a Given Keyword.
      operationId: gethotels
      description: ''
      parameters:
      - name: keyword
        in: query
        description: Location query keyword
        required: true
        type: string
        pattern: ^[A-Za-z0-9 *'-]{4,40}$
        minLength: 4
        maxLength: 40
        x-example: PARI
      - name: subType
        in: query
        description: "Category of search - To enter several values, repeat the query parameter \nUse HOTEL_LEISURE to target aggregators or HOTEL_GDS to target directly the chains"
        required: true
        type: array
        items:
          type: string
          enum:
          - HOTEL_LEISURE
          - HOTEL_GDS
        collectionFormat: multi
        x-example: []
      - name: countryCode
        in: query
        description: The country in which you search the subType. Country Code in [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) format
        type: string
        pattern: '[A-Za-z]{2}$'
        minLength: 2
        maxLength: 2
        x-example: FR
      - name: lang
        in: query
        description: "The language in which you want the results in following [ISO 639-1](https://fr.wikipedia.org/wiki/Liste_des_codes_ISO_639-1). \n\nIf the language entered is not available then the results will be shown in the default language, English."
        required: false
        type: string
        pattern: '[A-Za-z]{2}$'
        minLength: 2
        maxLength: 2
        default: EN
        x-example: EN
      - name: max
        in: query
        description: The number of results requested from 1 to 20
        required: false
        type: integer
        default: 20
        x-example: 1
      responses:
        '200':
          description: Successful Search Operation
          schema:
            required:
            - data
            properties:
              data:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                      description: ID of the resource.
                      minimum: 1
                      maximum: 10
                    type:
                      type: string
                      description: Type of resource or the resource name.
                    name:
                      type: string
                      description: Name of the location (Hotel Name)
                      minLength: 1
                      maxLength: 80
                      pattern: ^[A-Za-z0-9 - * '.]+
                    iataCode:
                      type: string
                      description: '[IATA codes](http://www.iata.org/publications/Pages/code-search.aspx) associated with the location.'
                      minLength: 3
                      maxLength: 3
                      pattern: ^[A-Z]+
                    hotelIds:
                      type: array
                      description: 'HotelIDs associated with the location only if it''s a hotel. For leisure property dupes ID are listed as well. '
                      uniqueItems: true
                      maxItems: 10
                      minItems: 1
                      items:
                        type: string
                    subType:
                      type: string
                      description: The category of the location or Point of reference (HOTEL_LEISURE,HOTEL_GDS).
                      enum:
                      - HOTEL_GDS
                      - HOTEL_LEISURE
                    address:
                      type: object
                      description: Address of the location containing Cityname, Statecode and countrycode respectively.
                      properties:
                        cityName:
                          type: string
                          description: The name of the city to which the location belongs to.
                          minLength: 1
                          maxLength: 105
                          pattern: ^[A-Za-z0-9 - ]+
                        stateCode:
                          type: string
                          description: The statecode to which the location belongs to.
                          minLength: 2
                          maxLength: 2
                          pattern: ^[A-Z]+
                        countryCode:
                          type: string
                          description: The countrycode to which the location belongs to.
                          minLength: 2
                          maxLength: 2
                          pattern: ^[A-Z]+
                      required:
                      - cityName
                      - countryCode
                    geoCode:
                      type: object
                      description: Geocode of the location containing latitude and longitude respectively.
                      properties:
                        latitude:
                          type: number
                          format: double
                          description: Latitude of the location on Earth.
                        longitude:
                          type: number
                          format: double
                          description: Longitude of the location on Earth.
                      required:
                      - latitude
                      - longitude
                    relevance:
                      type: integer
                      description: A no. between 1-100. The higher the number better is the relevant search for that location.
                  required:
                  - id
                  - type
                  - name
                  - iataCode
                  - hotelIds
                  - subType
            title: Success
            example: &id001
              data:
