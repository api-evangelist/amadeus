naftiko: "1.0.0-alpha2"
info:
  label: "Transfer Search — Shopping"
  description: 'Transfer Search — Shopping. 1 operation(s). Lead operation: Amadeus Gets Transfer Offers.. Self-contained Naftiko capability covering one Amadeus business surface.'
  tags:
    - Amadeus
    - Travel
    - Shopping
  created: "2026-05-29"
  modified: "2026-05-29"
binds:
  - namespace: env
    keys:
      AMADEUS_TOKEN: AMADEUS_TOKEN
capability:
  consumes:
    - type: http
      namespace: transfer-search-shopping
      baseUri: https://test.api.amadeus.com/v1
      description: Transfer Search — Shopping business capability. Self-contained, no shared references.
      authentication:
        type: bearer
        token: '{{env.AMADEUS_TOKEN}}'
      resources:
        - name: shopping-transfer-offers
          path: /shopping/transfer-offers
          operations:
            - name: getTransferOffers
              method: POST
              description: Amadeus Gets Transfer Offers.
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
                  description: Amadeus Gets Transfer Offers.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: transfer-search-shopping-rest
      port: 8080
      description: REST adapter for Transfer Search — Shopping. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/shopping/transfer-offers
          name: shopping-transfer-offers
          description: REST surface for shopping-transfer-offers.
          operations:
            - method: POST
              name: getTransferOffers
              description: Amadeus Gets Transfer Offers.
              call: transfer-search-shopping.getTransferOffers
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: transfer-search-shopping-mcp
      port: 9090
      transport: http
      description: MCP adapter for Transfer Search — Shopping. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: gets-transfer-offers
          description: Amadeus Gets Transfer Offers.
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: transfer-search-shopping.getTransferOffers
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
