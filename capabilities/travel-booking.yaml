naftiko: 1.0.0-alpha1
info:
  label: Amadeus Full Travel Booking
  description: End-to-end travel booking workflow combining flight search, pricing, booking, hotel search, hotel booking, and transfer search for complete trip planning and reservation.
  tags:
  - Amadeus
  - Flights
  - Hotels
  - Transfers
  - Booking
  - Travel
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AMADEUS_API_KEY: AMADEUS_API_KEY
    AMADEUS_API_SECRET: AMADEUS_API_SECRET
    AMADEUS_BEARER_TOKEN: AMADEUS_BEARER_TOKEN
capability:
  consumes:
  - import: flight-offers-search
    location: ./shared/flight-offers-search.yaml
  - import: hotel-search
    location: ./shared/hotel-search.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: amadeus-travel-booking-api
    description: Unified travel booking REST API.
    resources:
    - path: /v1/flights/offers
      name: flight-offers
      description: Flight search.
      operations:
      - method: GET
        name: search-flights
        description: Search available flights.
        call: flight-offers-search.search-flight-offers
        with:
          originLocationCode: rest.originLocationCode
          destinationLocationCode: rest.destinationLocationCode
          departureDate: rest.departureDate
          adults: rest.adults
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hotels/offers
      name: hotel-offers
      description: Hotel search.
      operations:
      - method: GET
        name: search-hotels
        description: Search available hotels.
        call: hotel-search.search-hotel-offers
        with:
          hotelIds: rest.hotelIds
          checkInDate: rest.checkInDate
          checkOutDate: rest.checkOutDate
          adults: rest.adults
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amadeus-travel-booking-mcp
    transport: http
    description: MCP server for AI-assisted travel planning and booking.
    tools:
    - name: search-flights
      description: Search for available flights between two cities on a given date.
      hints:
        readOnly: true
        openWorld: true
      call: flight-offers-search.search-flight-offers
      with:
        originLocationCode: tools.originLocationCode
        destinationLocationCode: tools.destinationLocationCode
        departureDate: tools.departureDate
        adults: tools.adults
      outputParameters:
      - type: object
        mapping: $.
    - name: search-hotels
      description: Search for available hotel rooms and rates for specific hotel properties.
      hints:
        readOnly: true
        openWorld: true
      call: hotel-search.search-hotel-offers
      with:
        hotelIds: tools.hotelIds
        checkInDate: tools.checkInDate
        checkOutDate: tools.checkOutDate
        adults: tools.adults
      outputParameters:
      - type: object
        mapping: $.
