naftiko: "1.0.0-alpha2"
info:
  label: "Flight Most Booked Destinations — Air Traffic"
  description: 'Flight Most Booked Destinations — Air Traffic. 1 operation(s). Lead operation: Amadeus Returns a List of Air Traffic Reports.. Self-contained Naftiko capability covering one Amadeus business surface.'
  tags:
    - Amadeus
    - Travel
    - Air Traffic
  created: "2026-05-29"
  modified: "2026-05-29"
binds:
  - namespace: env
    keys:
      AMADEUS_TOKEN: AMADEUS_TOKEN
capability:
  consumes:
    - type: http
      namespace: flight-most-booked-destinations-air-traffic
      baseUri: https://test.api.amadeus.com/v1
      description: Flight Most Booked Destinations — Air Traffic business capability. Self-contained, no shared references.
      authentication:
        type: bearer
        token: '{{env.AMADEUS_TOKEN}}'
      resources:
        - name: travel-analytics-air-traffic-booked
          path: /travel/analytics/air-traffic/booked
          operations:
            - name: getAirTraffic
              method: GET
              description: Amadeus Returns a List of Air Traffic Reports.
              inputParameters:
                - name: originCityCode
                  in: query
                  type: string
                  required: true
                  description: Code for the origin city following IATA standard ([IATA table codes](http://www.iata.org/publications/Pages/code-search.aspx)). - e.g. BOS for Boston
                - name: period
                  in: query
                  type: string
                  required: true
                  description: "period when consumers are traveling.\n* It can be a month only. \n* ISO format must be used - e.g. 2015-05. \n* Period ranges are not supported. \n* Only periods from 2011-01 up to previous month are vali"
                - name: max
                  in: query
                  type: number
                  required: false
                  description: maximum number of destinations in the response. Default value is 10 and maximum value is 50.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: flight-most-booked-destinations-air-traffic-rest
      port: 8080
      description: REST adapter for Flight Most Booked Destinations — Air Traffic. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/travel/analytics/air-traffic/booked
          name: travel-analytics-air-traffic-booked
          description: REST surface for travel-analytics-air-traffic-booked.
          operations:
            - method: GET
              name: getAirTraffic
              description: Amadeus Returns a List of Air Traffic Reports.
              call: flight-most-booked-destinations-air-traffic.getAirTraffic
              with:
                originCityCode: rest.originCityCode
                period: rest.period
                max: rest.max
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: flight-most-booked-destinations-air-traffic-mcp
      port: 9090
      transport: http
      description: MCP adapter for Flight Most Booked Destinations — Air Traffic. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: returns-list-air-traffic-reports
          description: Amadeus Returns a List of Air Traffic Reports.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: flight-most-booked-destinations-air-traffic.getAirTraffic
          with:
            originCityCode: tools.originCityCode
            period: tools.period
            max: tools.max
          outputParameters:
            - type: object
              mapping: $.
