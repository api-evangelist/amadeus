naftiko: "1.0.0-alpha2"
info:
  label: "Travel Recommendations API — Recommended Locations"
  description: 'Travel Recommendations API — Recommended Locations. 1 operation(s). Lead operation: Amadeus GET Recommended Destinations. Self-contained Naftiko capability covering one Amadeus business surface.'
  tags:
    - Amadeus
    - Travel
    - Recommended Locations
  created: "2026-05-29"
  modified: "2026-05-29"
binds:
  - namespace: env
    keys:
      AMADEUS_TOKEN: AMADEUS_TOKEN
capability:
  consumes:
    - type: http
      namespace: travel-recommendations-recommended-locations
      baseUri: https://test.api.amadeus.com/v1
      description: Travel Recommendations API — Recommended Locations business capability. Self-contained, no shared references.
      authentication:
        type: bearer
        token: '{{env.AMADEUS_TOKEN}}'
      resources:
        - name: reference-data-recommended-locations
          path: /reference-data/recommended-locations
          operations:
            - name: getRecommendedLocation
              method: GET
              description: Amadeus GET Recommended Destinations
              inputParameters:
                - name: cityCodes
                  in: query
                  type: string
                  required: true
                  description: "City used by the algorythm to recommend new destination. Several cities can be specified using comma.\n\nCity codes follow [IATA standard](http://www.iata.org/publications/Pages/code-search.aspx)"
                - name: travelerCountryCode
                  in: query
                  type: string
                  required: false
                  description: Origin country of the traveler following [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) code format (e.g. US)
                - name: destinationCountryCodes
                  in: query
                  type: string
                  required: false
                  description: "List of country the traveler want to visit, separated with comma.\n\nCountry codes follow [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2) code format (e.g. US)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: travel-recommendations-recommended-locations-rest
      port: 8080
      description: REST adapter for Travel Recommendations API — Recommended Locations. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/reference-data/recommended-locations
          name: reference-data-recommended-locations
          description: REST surface for reference-data-recommended-locations.
          operations:
            - method: GET
              name: getRecommendedLocation
              description: Amadeus GET Recommended Destinations
              call: travel-recommendations-recommended-locations.getRecommendedLocation
              with:
                cityCodes: rest.cityCodes
                travelerCountryCode: rest.travelerCountryCode
                destinationCountryCodes: rest.destinationCountryCodes
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: travel-recommendations-recommended-locations-mcp
      port: 9090
      transport: http
      description: MCP adapter for Travel Recommendations API — Recommended Locations. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: get-recommended-destinations
          description: Amadeus GET Recommended Destinations
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: travel-recommendations-recommended-locations.getRecommendedLocation
          with:
            cityCodes: tools.cityCodes
            travelerCountryCode: tools.travelerCountryCode
            destinationCountryCodes: tools.destinationCountryCodes
          outputParameters:
            - type: object
              mapping: $.
