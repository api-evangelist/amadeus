naftiko: "1.0.0-alpha2"
info:
  label: "Hotel Booking API — Booking"
  description: 'Hotel Booking API — Booking. 1 operation(s). Lead operation: Amadeus Create Hotel Order. Self-contained Naftiko capability covering one Amadeus business surface.'
  tags:
    - Amadeus
    - Travel
    - Booking
  created: "2026-05-29"
  modified: "2026-05-29"
binds:
  - namespace: env
    keys:
      AMADEUS_TOKEN: AMADEUS_TOKEN
capability:
  consumes:
    - type: http
      namespace: hotel-booking-booking
      baseUri: https://test.api.amadeus.com/v2
      description: Hotel Booking API — Booking business capability. Self-contained, no shared references.
      authentication:
        type: bearer
        token: '{{env.AMADEUS_TOKEN}}'
      resources:
        - name: booking-hotel-orders
          path: /booking/hotel-orders
          operations:
            - name: createHotelOrder
              method: POST
              description: Amadeus Create Hotel Order
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: false
                  description: Amadeus Create Hotel Order
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: hotel-booking-booking-rest
      port: 8080
      description: REST adapter for Hotel Booking API — Booking. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/booking/hotel-orders
          name: booking-hotel-orders
          description: REST surface for booking-hotel-orders.
          operations:
            - method: POST
              name: createHotelOrder
              description: Amadeus Create Hotel Order
              call: hotel-booking-booking.createHotelOrder
              with:
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: hotel-booking-booking-mcp
      port: 9090
      transport: http
      description: MCP adapter for Hotel Booking API — Booking. One tool per consumed operation, routed inline through this capability's consumes block.
      tools:
        - name: create-hotel-order
          description: Amadeus Create Hotel Order
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: hotel-booking-booking.createHotelOrder
          with:
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
