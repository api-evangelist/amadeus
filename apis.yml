    description: Search hotels by city, geocoordinates, or hotel ID, view room offers and pricing, and complete hotel bookings at over 150,000 properties worldwide.
  - name: Ground Transportation
    description: Search and book private transfers, taxis, shared rides, airport express, and helicopter services across multiple mobility providers.
  - name: Destination Experiences
    description: Discover tours, activities, tickets, points of interest, and safety scores for destinations worldwide, powered by 45+ activity platforms.
  - name: AI-Powered Travel Insights
    description: Use machine learning APIs to predict flight delays, recommend destinations, identify trip purpose, analyze flight prices, and predict traveler flight choices.
- type: UseCases
  data:
  - name: Flight Booking Engine
    description: Build end-to-end flight booking flows using flight offers search, price confirmation, and order creation APIs.
  - name: Hotel Booking Platform
    description: Create hotel booking experiences by combining hotel list, hotel search, and hotel booking APIs.
  - name: Trip Planning Application
    description: Build complete trip planners that combine flights, hotels, transfers, and local activities in a unified travel experience.
  - name: Travel Intelligence Dashboard
    description: Build market insights dashboards using flight analytics APIs for trending destinations, busiest periods, and price analysis.
  - name: Corporate Travel Management
    description: Power corporate travel tools with flight search, trip purpose prediction, delay predictions, and itinerary parsing capabilities.
- type: Integrations
  data:
  - name: Viator
    description: Amadeus Tours and Activities API aggregates offers from Viator for tours, experiences, and activity bookings at destinations worldwide.
  - name: GetYourGuide
    description: GetYourGuide activity offers are included in the Amadeus Tours and Activities API for comprehensive activity discovery.
  - name: GeoSure
    description: The Amadeus Safe Place API is powered by GeoSure neighborhood safety scores covering crime, health, and safety ratings for over 65,000 locations.
  - name: Leonardo
    description: Amadeus recommends Leonardo as the trusted content partner for hotel images and property media not available through self-service APIs.
  - name: Postman
    description: Amadeus provides a public Postman workspace for developers to explore and test all self-service APIs interactively.
