- type: Features
  data:
  - name: 40+ Travel REST APIs
    description: Comprehensive catalog spanning flights, hotels, destination experiences,
      cars and transfers, market insights, itinerary management, and AI-powered prediction.
  - name: OAuth 2.0 Client Credentials
    description: Server-to-server authentication with short-lived bearer tokens (~30
      min TTL) on a single token endpoint shared by all APIs.
  - name: Test and Production Environments
    description: Free, cached test environment for development; production environment
      for live data with pay-as-you-go billing above monthly free tiers.
  - name: Multi-Language SDKs
    description: Official SDKs for Node.js, Python, Java, and Ruby with built-in token
      management, retries, and pagination.
  - name: AI-Powered Predictions
    description: Trip Purpose, Flight Choice, Flight Delay, Price Analysis, Travel
      Recommendations, and Location Score APIs powered by machine learning over Amadeus
      travel data.
  - name: Sentiment-Analyzed Hotel Ratings
    description: Hotel ratings derived from millions of online reviews, broken down
      by service, room, location, and food.
  - name: Branded Fares and Ancillaries
    description: Branded Fares Upsell and SeatMap Display surface merchandising opportunities
      at search and booking time.
  - name: Market Insights APIs
    description: Most booked destinations, most traveled destinations, and busiest
      travel periods power demand and trend analytics.
  - name: Postman Public Workspace
    description: Curated Postman collection with examples for every Self-Service API,
      maintained by the amadeus4dev team.
  - name: Open OpenAPI Specifications Repository
    description: Canonical Swagger/OpenAPI specs published on GitHub at amadeus4dev/amadeus-open-api-specification.
- type: UseCases
  data:
  - name: Online Travel Agency (OTA)
    description: Build a full flight + hotel + activities OTA using Flight Offers
      Search, Hotel Search, Tours and Activities, Transfer Search, and the corresponding
      booking APIs.
  - name: Corporate Travel Tool
    description: Combine Flight Offers Search, Trip Purpose Prediction, and Hotel
      Search to deliver policy-aware corporate booking flows.
  - name: Travel Inspiration App
    description: Use Flight Inspiration Search, Flight Cheapest Date Search, Travel
      Recommendations, and Location Score to inspire destination choices.
  - name: Flight Tracking and Status Apps
    description: Use On-Demand Flight Status, Airport On-Time Performance, and Flight
      Delay Prediction to build proactive disruption-aware traveler experiences.
  - name: Hotel Marketing and Merchandising
    description: Combine Hotel Search, Hotel Ratings, and Points of Interest to merchandise
      hotels with location context and review sentiment.
  - name: Destination Marketing
    description: Use Tours and Activities, Points of Interest, Safe Place, and Location
      Score to power destination marketing organization (DMO) experiences.
  - name: Travel Analytics and BI
    description: Use the Market Insights APIs (Most Booked, Most Traveled, Busiest
      Period) for demand and trend dashboards.
  - name: Ground Transportation Booking
    description: Use Transfer Search, Transfer Book, and Transfer Management to add
      airport-to-hotel ground transport to an itinerary.
  - name: Hackathon and MVP Travel Apps
    description: Use the free Test environment, official SDKs, and amadeus4dev sample
      apps to ship a travel MVP in days.
  - name: AI Travel Agents
    description: Wrap Self-Service APIs in MCP servers (community implementations
      exist) to give LLM agents flight, hotel, and activity search and booking capabilities.
- type: Integrations
  data:
  - name: Postman
    description: Official Amadeus for Developers public workspace with collections
      for every Self-Service API.
  - name: Node.js
    description: Official npm package `amadeus` with built-in OAuth handling.
  - name: Python
    description: Official PyPI package `amadeus` with built-in OAuth handling and
      pagination.
  - name: Java
    description: Official Maven Central artifact `com.amadeus:amadeus-java`.
  - name: Ruby
    description: Official Ruby SDK at github.com/amadeus4dev/amadeus-ruby.
  - name: Django
    description: Multiple sample Django apps demonstrating flight booking, hotel booking,
      and tours integration.
  - name: Model Context Protocol (MCP)
    description: Several community MCP servers expose Amadeus Self-Service APIs as
      tools for Claude and other LLM agents.
  - name: Bottleneck
    description: Community example using the Bottleneck rate-limiter to manage Amadeus
      TPS quotas in Node.js apps.
- type: Solutions
  data:
  - name: Amadeus for Developers Self-Service
    description: 'Self-service catalog of 40+ REST APIs with free Test environment
      and pay-as-you-go Production environment. NOTE: scheduled for decommissioning
      17 July 2026.'
  - name: Amadeus Enterprise
    description: Enterprise developer portal and SLA-backed access to the full Amadeus
      distribution, ticketing, and operations APIs, including NDC content and Margins/Discounts
      not available in Self-Service.
  - name: Amadeus Travel Platform
    description: The underlying global distribution and travel technology platform
      powering airlines, hotels, ground transport, and travel agencies worldwide.
